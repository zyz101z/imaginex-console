<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis World - Elemental Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #game-wrapper {
            position: relative;
            border: 6px solid #222;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
            background: #000;
        }

        canvas {
            image-rendering: pixelated;
            display: block;
        }

        #ui-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 800px;
            height: 600px;
            pointer-events: none;
            z-index: 10;
        }

        /* --- TITLE SCREEN --- */
        #main-menu {
            position: absolute;
            inset: 0;
            background: #1e1b4b;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
            pointer-events: all;
            overflow: hidden;
        }

        .sky-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 60%;
            background: linear-gradient(to bottom, #1e1b4b 0%, #701a75 50%, #fb923c 100%);
        }

        .retro-sun {
            position: absolute;
            top: 100px; left: 50%; transform: translateX(-50%);
            width: 280px; height: 280px;
            background: linear-gradient(to bottom, #fde047 0%, #f97316 100%);
            border-radius: 50%;
            box-shadow: 0 0 40px #f97316;
            mask-image: repeating-linear-gradient(to bottom, black 0px, black 15px, transparent 15px, transparent 20px);
        }

        .stadium-layer {
            position: absolute;
            bottom: 40%; width: 100%; height: 40px;
            background: repeating-linear-gradient(to right, #4c1d95, #4c1d95 2px, #5b21b6 2px, #5b21b6 4px);
            border-bottom: 4px solid #fff;
            z-index: 5;
        }

        .court-floor {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 40%;
            background: #15803d;
            z-index: 4;
            perspective: 400px;
        }
        
        .court-lines {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to right, white 4px, transparent 4px), linear-gradient(to bottom, white 4px, transparent 4px);
            background-size: 100px 40px;
            transform: rotateX(60deg) scale(2);
            transform-origin: center top;
            opacity: 0.3;
        }

        .logo-container { position: relative; margin-top: 50px; z-index: 20; text-align: center; }
        .logo-text { font-weight: 900; filter: drop-shadow(6px 6px 0px #000); }
        .logo-tennis { font-size: 70px; background: linear-gradient(to bottom, #fef08a 20%, #facc15 50%, #f97316 80%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -2px; }
        .logo-world { font-size: 80px; background: linear-gradient(to bottom, #bae6fd 20%, #38bdf8 50%, #0284c7 80%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-top: -20px; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .slot-panel { position: relative; z-index: 30; margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
        .slot-card { background: rgba(0, 0, 0, 0.85); border: 2px solid #334155; padding: 12px 20px; width: 480px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .slot-card:hover { border-color: #cf0; transform: scale(1.02); background: rgba(207, 255, 0, 0.05); }

        .scanlines { position: absolute; inset: 0; background: repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0px, rgba(0,0,0,0.05) 1px, rgba(0,0,0,0) 2px); pointer-events: none; z-index: 150; }

        .foreground-racket { position: absolute; bottom: -30px; right: 20px; width: 320px; z-index: 40; filter: drop-shadow(15px 15px 10px rgba(0,0,0,0.6)); transform: rotate(-10deg); }

        /* --- HUD --- */
        .stats-bar { background: rgba(0, 0, 0, 0.9); padding: 10px 15px; border-bottom: 3px solid #444; font-size: 10px; display: flex; justify-content: space-between; color: #0f0; pointer-events: all; }
        .dialog-box, .shop-box, #admin-panel { pointer-events: all; background: rgba(10, 10, 30, 0.98); border: 4px solid #fff; padding: 20px; font-size: 10px; display: none; box-shadow: 0 10px 0 rgba(0,0,0,0.7); max-width: 85%; margin: 100px auto; }
        #admin-panel { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); width: 320px; z-index: 110; border-color: #ef4444; margin: 0; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-height: 350px; overflow-y: auto; }
        .shop-item { border: 2px solid #333; padding: 10px; cursor: pointer; text-align: center; background: #111; display: flex; flex-direction: column; align-items: center; transition: 0.1s; }
        .shop-item:hover { border-color: #0f0; }
        .shop-item.equipped { border-color: #fbbf24; background: #222; }
        .item-preview-canvas { width: 60px; height: 60px; image-rendering: pixelated; margin-bottom: 10px; pointer-events: none; }
        .btn { pointer-events: all; background: #fff; color: #000; padding: 10px 20px; cursor: pointer; border: 3px solid #777; font-family: 'Press Start 2P', cursive; margin-top: 10px; font-size: 10px; }
        
        #special-meter-container { width: 180px; height: 20px; background: #222; border: 3px solid #fff; position: absolute; bottom: 20px; right: 20px; display: none; pointer-events: all; }
        #special-meter-fill { width: 0%; height: 100%; background: linear-gradient(to right, #f97316, #fbbf24); transition: width 0.1s; }
        #special-meter-container.meter-ready { border-color: #fbbf24; animation: meterPulse 0.5s ease-in-out infinite alternate; }
        #special-meter-container.meter-ready #special-meter-fill { background: linear-gradient(to right, #fbbf24, #fff); }
        @keyframes meterPulse { from { box-shadow: 0 0 6px #fbbf24; } to { box-shadow: 0 0 16px #fbbf24, 0 0 30px rgba(251,191,36,0.4); } }

        #achievement-popup { pointer-events:none; position:absolute; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px); background:rgba(10,10,30,0.95); border:3px solid #fbbf24; padding:12px 20px; text-align:center; z-index:80; transition:transform 0.4s ease-out, opacity 0.4s; opacity:0; box-shadow:0 0 20px rgba(251,191,36,0.4); }
        #achievement-popup.show { transform:translateX(-50%) translateY(0); opacity:1; }

        /* SIDE SCOREBOARD */
        #match-score { 
            pointer-events: none; position: absolute; 
            left: 15px; top: 50%; transform: translateY(-50%); 
            display: none; flex-direction: column; align-items: center; gap: 15px; 
            background: rgba(0, 0, 0, 0.95); padding: 20px 10px; border: 3px solid #fff; width: 90px; 
            z-index: 50; 
        }
        .score-slot { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .score-label { font-size: 6px; color: #888; }
        .score-val { font-size: 18px; font-weight: bold; }
        #save-status { position: absolute; top: 60px; right: 20px; font-size: 8px; color: #0f0; display: none; pointer-events: none; }
        #debug-toggle { position: absolute; bottom: 10px; left: 10px; width: 10px; height: 10px; pointer-events: all; cursor: default; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui-overlay">
            <!-- MAIN MENU -->
            <div id="main-menu">
                <div class="scanlines"></div>
                <div class="sky-bg"></div>
                <div class="retro-sun"></div>
                <div class="stadium-layer"></div>
                <div class="court-floor"><div class="court-lines"></div></div>
                <div class="logo-container">
                    <div class="logo-text logo-tennis">TENNIS</div>
                    <div class="logo-text logo-world">W<div class="inline-block relative top-2"><svg width="60" height="60" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#cf0"/><path d="M15 50 Q 50 10 85 50" stroke="#fff" fill="none" stroke-width="8" stroke-linecap="round"/><path d="M15 50 Q 50 90 85 50" stroke="#fff" fill="none" stroke-width="8" stroke-linecap="round"/></svg></div>RLD</div>

            <div id="achievement-popup"><div style="font-size:6px; color:#fbbf24; margin-bottom:4px;">ACHIEVEMENT UNLOCKED</div><div id="ach-popup-title" style="font-size:10px; color:#fff;"></div><div style="font-size:6px; color:#4ade80; margin-top:4px;">+1% HIT POWER</div></div>
            <div id="dialog" class="dialog-box"><div id="dialog-text">...</div><div id="dialog-actions"><button id="dialog-confirm-btn" class="btn">Confirm</button><button id="dialog-rematch-btn" class="btn" style="display:none; margin-left:8px; border-color:#fbbf24; color:#fbbf24;">Rematch?</button></div></div>
            <div id="shop" class="shop-box"><div class="mb-2 text-blue-400">PRO SHOP</div><div class="shop-grid" id="shop-grid"></div><button id="shop-exit-btn" class="btn w-full mt-4">Exit Shop</button></div>

            <div id="admin-panel">
                <div class="flex justify-between items-center mb-2"><span class="text-red-500">ADMIN</span><button id="admin-close-btn">X</button></div>
                <div class="space-y-3">
                    <button id="admin-add-rep-btn" class="btn btn-sm w-full">+500 REP</button>
                    <button id="admin-medal-btn" class="btn btn-sm w-full">GIVE MEDAL</button>
                    <div class="border-t border-gray-700 pt-2"><p class="mb-1 text-gray-400">MARK GYMS BEAT:</p>
                        <div class="grid grid-cols-2 gap-1">
                            <label class="flex items-center gap-1"><input type="checkbox" id="check-plant"> PLANT</label>
                            <label class="flex items-center gap-1"><input type="checkbox" id="check-ice"> ICE</label>
                            <label class="flex items-center gap-1"><input type="checkbox" id="check-water"> WATER</label>

                        </div>

                <button id="pause-resume-btn" class="btn" style="width:200px;">RESUME</button>

            </div>

    function playSfx(f, t, d, v = 0.05) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
    }

    function musicLoop() {
        if (!musicPlaying) {
            setTimeout(musicLoop, 1000);
            return;
        }
        let cz = "Town";
        const effectiveState = (gameState === 'PAUSED') ? prePauseState : gameState;
        if (effectiveState === 'MENU') cz = "Menu";
        else if (effectiveState && effectiveState.includes('MATCH')) {
            // Battle music based on opponent zone/type
            if (gameState === 'TUTORIAL_MATCH') cz = "Battle_Town";
            else if (activeNPC) {
                if (activeNPC.type === 'boss' || activeNPC.type === 'king') cz = "Battle_Boss";
                else if (activeNPC.type === 'volcano_boss') cz = "Battle_Volcano";
                else cz = "Battle_" + (activeNPC.zone || "Town");
            } else cz = "Battle_Town";
        }
        else {
            if (isOnVolcanoIsland(player.x, player.y)) { cz = "Volcano"; }
            else if (player.y < OCEAN_LIMIT) { cz = "Ocean"; }
            else {
                const txStart = WORLD_W/2 - 450, txEnd = WORLD_W/2 + 450;
                const tyStart = LAND_OFFSET + 450, tyEnd = LAND_OFFSET + 1350;
                const relY = player.y - LAND_OFFSET;
                if (player.x > txStart && player.x < txEnd && player.y > tyStart && player.y < tyEnd) { cz = "Town"; }
                else if (relY >= 0) {
                    if (player.x < WORLD_W/2 && relY < 900) cz = "Ice";
                    else if (player.x >= WORLD_W/2 && relY < 900) cz = "Fire";
                    else if (player.x >= WORLD_W/2 && player.y >= WORLD_H/2) cz = "Water";
                    else cz = "Plant";
                }
            }
        }
        if (audioCtx) {
            const m = melodies[cz] || melodies["Town"];
            if (m) {
                const isMatch = cz.startsWith('Battle_');
                playSfx(m.notes[noteIdx], m.type, 0.4, isMatch ? 0.008 : 0.02);
                noteIdx = (noteIdx + 1) % m.notes.length;
                setTimeout(musicLoop, m.tempo);
            } else { setTimeout(musicLoop, 1000); }
        } else { setTimeout(musicLoop, 1000); }
    }

    function checkAchievements() {

        if (defeatedGyms.length >= 1) unlockAchievement('gym_1');
        if (defeatedGyms.length >= 4) unlockAchievement('gym_all');
        if (hasGoldMedal) unlockAchievement('olympics');
        if (hasPirateMedal) unlockAchievement('pirate');
        if (inventory.includes('racket_temple')) unlockAchievement('darklord');
        if (defeatedVolcano.includes('vboss')) unlockAchievement('volcano');
        if (chestStates.every(c => c)) unlockAchievement('chest_all');
        if (inventory.includes('boat')) unlockAchievement('buy_boat');
        if (['Town Center','Ice Zone','Fire Zone','Water Zone','Plant Zone','The Ocean'].every(z => visitedZones.has(z))) unlockAchievement('visit_all');
        if (matchStats.itemsBought >= 3) unlockAchievement('shop_3');
        if (matchStats.bestRally >= 20) unlockAchievement('rally_20');
        if (matchStats.specialsUsed >= 10) unlockAchievement('special_10');
        const metaIds = ['all_achievements', 'power_max'];
        const nonMeta = ACHIEVEMENTS.filter(a => !metaIds.includes(a.id));

    }

            if (hasPirateMedal) return "The Darklord's court has a barrier that bounces your shots back. Time your shots carefully!";

                actionDiv.textContent = 'EQUIPPED';
                actionDiv.style.color = '#fbbf24';
            } else if (owned) {
                actionDiv.textContent = item.type === 'boat' ? 'OWNED' : 'EQUIP';
                actionDiv.style.color = '#4ade80';
            } else {
                actionDiv.textContent = item.cost + ' REP';
                actionDiv.style.color = rep >= item.cost ? '#60a5fa' : '#ef4444';
            }
            div.appendChild(actionDiv);

            div.onclick = () => {
                if (isEquipped) return;
                if (owned) {
                    if (item.type === 'boat') return;
                    equipped[item.type] = item.id;
                    if (item.type === 'suit') player.suit = item.val;
                    else if (item.type === 'hair') player.hair = item.val;
                    else if (item.type === 'racket') player.racket = item.val;
                    updatePlayerStats();
                    playSfx(600, 'sine', 0.2);
                    saveGameData();
                    openShop();
                } else if (rep >= item.cost) {
                    rep -= item.cost;
                    inventory.push(item.id);
                    matchStats.itemsBought++; checkAchievements();
                    document.getElementById('rep-val').innerText = rep;
                    playSfx(800, 'square', 0.3);
                    saveGameData();
                    openShop();
                } else {
                    playSfx(100, 'sawtooth', 0.3);
                }
            };

            grid.appendChild(div);
        });

    async function scanSlots() {
        const container = document.getElementById('slot-container'); container.innerHTML = '';
        for(let i=1; i<=3; i++) {
            let data = null;
            if (firebaseOk && user) {
                const docRef = doc(db_init, 'artifacts', appId, 'users', user.uid, 'saves', 'slot' + i);
                const snap = await getDoc(docRef);
                data = snap.exists() ? snap.data() : null;
            } else {
                const raw = localStorage.getItem('tw_slot' + i);
                if (raw) data = JSON.parse(raw);
            }
            const card = document.createElement('div'); card.className = 'slot-card';
            const info = `<div><div class="text-[#facc15] text-[10px] mb-1">PROFILE 0${i}</div><div class="text-[6px] text-white opacity-70">${data ? 'REP: ' + data.rep + ' | GYMS: ' + (data.defeatedGyms ? data.defeatedGyms.length : 0) : 'NEW DATA'}</div></div>`;
            const actions = data
                ? `<div style="display:flex; gap:8px; align-items:center;"><div class="text-blue-400 text-[8px] border border-blue-400/40 px-3 py-2">LOAD</div><div class="slot-delete-btn" style="color:#ef4444; font-size:8px; border:1px solid rgba(239,68,68,0.4); padding:4px 8px; cursor:pointer; font-family:'Press Start 2P',cursive;">DEL</div></div>`
                : `<div class="text-blue-400 text-[8px] border border-blue-400/40 px-3 py-2">CREATE</div>`;
            card.innerHTML = info + actions;
            card.onclick = (e) => { if (e.target.closest('.slot-delete-btn')) return; if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); musicPlaying = true; loadSlotData(i); };
            if (data) {
                const delBtn = card.querySelector('.slot-delete-btn');
                const slotNum = i;
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (delBtn.dataset.confirm) { deleteSlot(slotNum); return; }
                    delBtn.dataset.confirm = '1'; delBtn.innerText = 'SURE?'; delBtn.style.borderColor = '#ef4444'; delBtn.style.color = '#fff'; delBtn.style.background = '#991b1b';
                    setTimeout(() => { delBtn.removeAttribute('data-confirm'); delBtn.innerText = 'DEL'; delBtn.style.borderColor = 'rgba(239,68,68,0.4)'; delBtn.style.color = '#ef4444'; delBtn.style.background = ''; }, 2000);
                };
            }
            container.appendChild(card);
        }
    }

        match.p1.score = 0; match.cpu.score = 0; match.p1.specialMeter = 0;
        document.getElementById('top-bar').style.display = 'none'; document.getElementById('ach-btn').style.display = 'none'; document.getElementById('match-score').style.display = 'flex';
        document.getElementById('special-meter-container').style.display = 'block';
        if (tournamentRound === 1) activeNPC = { name: "Rival Chad", level: 4.5, zone: 'Town', type: 'tourney', action: 'MATCH', color: '#dc2626', hair: '#111' };
        else if (tournamentRound === 2) activeNPC = { name: "Champion Ace", level: 6.5, zone: 'Fire', type: 'tourney', action: 'MATCH', color: '#ef4444', hair: '#000' };
        else if (tournamentRound === 3) activeNPC = { name: "King Smash", level: 9.0, zone: 'Town', type: 'king', action: 'MATCH', color: '#fbbf24', hair: '#444' };
        if(activeNPC) document.getElementById('cpu-name-label').innerText = activeNPC.name.toUpperCase();
        document.getElementById('match-goal-text').innerText = "GOAL: 11";
        document.getElementById('dialog').style.display = 'none'; gameState = 'MATCH'; resetMatch();
    }
    
    function startTutorialMatch() {
        gameState = 'TUTORIAL_MATCH'; match.p1.score = 0; match.cpu.score = 0; match.p1.specialMeter = 0;
        document.getElementById('cpu-name-label').innerText = "CHAD";
        document.getElementById('p1-score').innerText = 0; document.getElementById('cpu-score').innerText = 0;
        document.getElementById('match-goal-text').innerText = "GOAL: 5";
        document.getElementById('top-bar').style.display = 'none'; document.getElementById('ach-btn').style.display = 'none'; document.getElementById('match-score').style.display = 'flex';
        document.getElementById('special-meter-container').style.display = 'block'; document.getElementById('dialog').style.display = 'none';
        resetMatch();
    }

    function handleDialogAction() {
        if(activeNPC) {
            if (activeNPC.type === 'bully') { startTutorialMatch(); return; }
            if (activeNPC.type === 'bully_done') { tutorialDone = true; if(!inventory.includes('racket_basic')) inventory.push('racket_basic'); equipped.racket = 'racket_basic'; player.racket = '#eee'; updatePlayerStats(); saveGameData(); gameState = 'OVERWORLD'; document.getElementById('top-bar').classList.remove('hidden'); document.getElementById('bottom-bar').classList.remove('hidden'); document.getElementById('ach-btn').style.display = 'block'; document.getElementById('dialog').style.display = 'none'; updateObjectiveHint(); return; }
            if (activeNPC.action === 'TOURNAMENT_START') { if (tournamentRound === 0) tournamentRound = 1; startTournamentMatch(); return; }
            if (activeNPC.action === 'MATCH') { startStandardMatch(); return; }
        }
        gameState = 'OVERWORLD'; document.getElementById('dialog').style.display = 'none';
    }

    function handleSpace() {
        if(gameState === 'DIALOG') { document.getElementById('dialog-rematch-btn').style.display = 'none'; handleDialogAction(); }
        else if(gameState === 'HOUSE') { player.x = player.ovX; player.y = player.ovY + 60; gameState = 'OVERWORLD'; }
        else if(gameState === 'OVERWORLD') {
            document.getElementById('dialog-rematch-btn').style.display = 'none';
            const n = NPCs.find(npc => Math.hypot(npc.x - player.x, npc.y - player.y) < 60);
            if(n) {
                if (n.type === 'house') { player.ovX = player.x; player.ovY = player.y; player.x = 400; player.y = 500; gameState = 'HOUSE'; return; }
                activeNPC = n; if(n.type === 'shop') { openShop(); return; }
                gameState = 'DIALOG'; document.getElementById('dialog').style.display = 'block';
                if (n.name === "Darklord" && !inventory.includes('boat')) { document.getElementById('dialog-text').innerText = `Darklord: "No boat? Begone!"`; if(activeNPC) activeNPC.action = 'EXIT'; return; }
                if(n.type === 'olympics') {
                    if (defeatedGyms.length < 4) { document.getElementById('dialog-text').innerText = `${n.name}: "Defeat all 4 Gyms first!"`; if(activeNPC) activeNPC.action = 'EXIT'; }
                    else if (hasGoldMedal) { document.getElementById('dialog-text').innerText = `${n.name}: "Greetings, Champ!"`; if(activeNPC) activeNPC.action = 'EXIT'; }
                    else { document.getElementById('dialog-text').innerText = `${n.name}: "Start Olympic gauntlet?"`; if(activeNPC) activeNPC.action = 'TOURNAMENT_START'; }
                } else if(n.type === 'gym') {
                    const idx = GYM_SEQUENCE.indexOf(n.gymId);
                    if (idx > 0 && !defeatedGyms.includes(GYM_SEQUENCE[idx-1])) { document.getElementById('dialog-text').innerText = `${n.name}: "Defeat previous gyms first!"`; if(activeNPC) activeNPC.action = 'EXIT'; }
                    else { if(activeNPC) activeNPC.action = 'MATCH'; document.getElementById('dialog-text').innerText = `${n.name}: "${n.dialog}" (Goal: 7)`; }
                } else if(n.type === 'boss') { if(activeNPC) activeNPC.action = 'MATCH'; document.getElementById('dialog-text').innerText = `${n.name}: "${n.dialog}" (Goal: 11)`; }
                else if(n.type === 'tip') { document.getElementById('dialog-text').innerText = `${n.name}: "${getTipDialog(n.name)}"`; if(activeNPC) activeNPC.action = 'EXIT'; }
                else if(n.type === 'quick') { document.getElementById('dialog-text').innerText = `${n.name}: "${n.dialog}"`; if(activeNPC) activeNPC.action = 'MATCH'; }
                else if(n.type === 'pirate') { document.getElementById('dialog-text').innerText = `${n.name}: "${n.dialog}"`; activeNPC.action = 'MATCH'; }
                else if(n.type === 'volcano_guard') {
                    if (defeatedVolcano.includes(n.volcanoId)) { document.getElementById('dialog-text').innerText = `${n.name}: "Pass freely."`; if(activeNPC) activeNPC.action = 'EXIT'; }
                    else { if(activeNPC) activeNPC.action = 'MATCH'; document.getElementById('dialog-text').innerText = `${n.name}: "${n.dialog}" (Goal: 7)`; }
                }
                else if(n.type === 'volcano_boss') {
                    if (defeatedVolcano.includes(n.volcanoId)) { document.getElementById('dialog-text').innerText = `${n.name}: "You beat me fair and square..."`; if(activeNPC) activeNPC.action = 'EXIT'; }
                    else { if(activeNPC) activeNPC.action = 'MATCH'; document.getElementById('dialog-text').innerText = `${n.name}: "${n.dialog}" (Goal: 11 — Win before the volcano erupts!)`; }
                }
                else { if(activeNPC) activeNPC.action = 'MATCH'; document.getElementById('dialog-text').innerText = `${n.name}: "${n.dialog}" (Goal: 3)`; }
            }
            chests.forEach((c, i) => { if (!chestStates[i] && Math.hypot(c.x - player.x, c.y - player.y) < 50) {
                if (c.type === 'pirate' && !hasPirateMedal) {
                    const pirate = NPCs.find(n => n.type === 'pirate');
                    if (pirate) { activeNPC = pirate; activeNPC.action = 'MATCH'; gameState = 'DIALOG'; document.getElementById('dialog').style.display = 'block'; document.getElementById('dialog-text').innerText = `${pirate.name}: "That's MY treasure! Beat me first, landlubber!"`; }
                    return;
                }
                chestStates[i] = true; rep += c.rep; document.getElementById('rep-val').innerText = rep; playSfx(800, 'square', 0.5); saveGameData(); checkAchievements(); gameState = 'DIALOG'; document.getElementById('dialog').style.display = 'block'; document.getElementById('dialog-text').innerText = `Chest Found! Received ${c.rep} REP.`; activeNPC = null;
            } });
        } else if((gameState === 'MATCH' || gameState === 'TUTORIAL_MATCH') && !match.active) { match.active = true; match.ball.vy = match.serving === 'p1' ? -6 : 6; match.ball.vx = (Math.random() - 0.5) * 4; }
    }

    function handleSpecial() { if (gameState.includes('MATCH') && match.p1.specialMeter >= 100) { match.p1.specialMeter = 0; match.ball.special = true; playSfx(1200, 'sawtooth', 0.3, 0.1); shakeIntensity = 15; match.ball.vy *= 2; } }

    function score(w) {
        matchStats.currentRally = 0;
        match[w].score++; document.getElementById('p1-score').innerText = match.p1.score; document.getElementById('cpu-score').innerText = match.cpu.score;
        playSfx(w==='p1'?800:150, 'square', 0.3);
        let goal = 3;
        if (gameState === 'TUTORIAL_MATCH') goal = 5;
        else if (activeNPC) {
            if (activeNPC.type === 'gym' || activeNPC.type === 'volcano_guard') goal = 7;
            else if (['tourney', 'king', 'boss', 'pirate', 'volcano_boss'].includes(activeNPC.type)) goal = 11;
        }

        if(match[w].score >= goal) {
            gameState = 'DIALOG'; document.getElementById('match-score').style.display = 'none'; document.getElementById('top-bar').style.display = 'flex'; document.getElementById('ach-btn').style.display = 'block'; document.getElementById('special-meter-container').style.display = 'none'; document.getElementById('dialog').style.display = 'block';
            if (activeNPC && activeNPC.type === 'bully') { 
                const win = (w === 'p1'); 
                document.getElementById('dialog-text').innerText = win ? "Chad: 'Lucky nerd! Take this racket. I'm going to beat every Gym Leader and win Gold before you!'" : "Chad: 'Hah! Loser! But take this old racket anyway. I'm going to win the Elemental Olympics. See ya!'"; activeNPC.type = 'bully_done'; return; 
            }
            if(w==='p1') {
                if (gameState !== 'TUTORIAL_MATCH') { matchStats.totalWins++; matchStats.currentStreak++; if (matchStats.currentStreak > matchStats.bestStreak) matchStats.bestStreak = matchStats.currentStreak; if (match.cpu.score === 0) { unlockAchievement('shutout'); if (activeNPC && activeNPC.type === 'gym') unlockAchievement('shutout_gym'); if (activeNPC && ['boss','pirate','volcano_boss'].includes(activeNPC.type)) unlockAchievement('shutout_boss'); } }
                if (activeNPC && activeNPC.type === 'gym' && !defeatedGyms.includes(activeNPC.gymId)) defeatedGyms.push(activeNPC.gymId);
                if (activeNPC && activeNPC.type === 'boss') { if(!inventory.includes('racket_temple')) inventory.push('racket_temple'); document.getElementById('dialog-text').innerText = "DARKLORD: 'Impossible... take the Temple Racket!'"; }
                else if (activeNPC && activeNPC.type === 'pirate') { hasPirateMedal = true; updatePlayerStats(); document.getElementById('dialog-text').innerText = "CAPTAIN: 'Yarr! Ye got skills! Take this Pirate Hat (+10% Power)!'"; activeNPC.action = 'EXIT'; }
                else if (activeNPC && activeNPC.type === 'gym') {
                    const gymRewards = { plant_gym: 75, ice_gym: 100, water_gym: 125, fire_gym: 150 };
                    const gymRep = gymRewards[activeNPC.gymId] || 75;
                    rep += gymRep; document.getElementById('rep-val').innerText = rep;
                    document.getElementById('dialog-text').innerText = `${activeNPC.name} defeated! +${gymRep} REP!`;
                    activeNPC.action = 'EXIT';
                }
                else if (activeNPC && activeNPC.type === 'volcano_guard') { if (!defeatedVolcano.includes(activeNPC.volcanoId)) defeatedVolcano.push(activeNPC.volcanoId); rep += 75; document.getElementById('rep-val').innerText = rep; document.getElementById('dialog-text').innerText = `${activeNPC.name}: "You've proven yourself. Pass freely."`; activeNPC.action = 'EXIT'; }
                else if (activeNPC && activeNPC.type === 'volcano_boss') { if (!defeatedVolcano.includes(activeNPC.volcanoId)) defeatedVolcano.push(activeNPC.volcanoId); if(!inventory.includes('racket_magma')) inventory.push('racket_magma'); document.getElementById('dialog-text').innerText = "CHAD: 'Impossible! Fine, take this Magma Racket I forged up here... nerd!'"; activeNPC.action = 'EXIT'; }
                else if (tournamentRound > 0) {
                    if (tournamentRound === 1) { document.getElementById('dialog-text').innerText = "Winner! advanced to Finals!"; tournamentRound = 2; activeNPC.action = 'TOURNAMENT_START'; }
                    else if (tournamentRound === 2) { document.getElementById('dialog-text').innerText = "CHAMPION! King awaits!"; tournamentRound = 3; activeNPC.action = 'TOURNAMENT_START'; }
                    else if (tournamentRound === 3) { document.getElementById('dialog-text').innerText = "DEFEATED KING! GOLD MEDAL!"; hasGoldMedal = true; document.getElementById('medal-icon').classList.remove('hidden'); tournamentRound = 0; activeNPC.action = 'EXIT'; }
                } else { const reward = (activeNPC && activeNPC.name === 'Leafy') ? 25 : 50; rep += reward; document.getElementById('rep-val').innerText = rep; document.getElementById('dialog-text').innerText = `Win! +${reward} Rep.`; if(activeNPC) activeNPC.action = 'EXIT'; }
            } else { if (gameState !== 'TUTORIAL_MATCH') matchStats.currentStreak = 0; document.getElementById('dialog-text').innerText = "Defeat!"; tournamentRound = 0; if(activeNPC) activeNPC.action = 'EXIT'; }
            saveGameData(); updateObjectiveHint(); checkAchievements();
            // Show rematch button for non-tournament, non-tutorial matches
            const rematchBtn = document.getElementById('dialog-rematch-btn');
            if (activeNPC && !tournamentRound && !['bully','bully_done'].includes(activeNPC.type)) { rematchBtn.style.display = 'inline-block'; } else { rematchBtn.style.display = 'none'; }
        } else { match.serving = w==='p1' ? 'cpu' : 'p1'; resetMatch(); }
    }

    function drawPixelPerson(x, y, color, hair, racketColor, swing, isP1) {
        ctx.save(); ctx.translate(x, y);
        let bob = (gameState.includes('MATCH')) ? Math.sin(Date.now()/200)*2 : 0; ctx.translate(0, bob);
        ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(-15, 12, 30, 8);
        ctx.fillStyle = color || '#fff'; 
        ctx.fillRect(-8, (gameState === 'OVERWORLD' && player.animFrame === 1) ? 8 : 5, 6, 8); 
        ctx.fillRect(2, (gameState === 'OVERWORLD' && player.animFrame === 1) ? 2 : 5, 6, 8); 
        ctx.fillRect(-12, -10, 24, 18); ctx.fillStyle = '#ffdbac'; ctx.fillRect(-9, -26, 18, 18);
        ctx.fillStyle = '#000'; ctx.fillRect(-5, -20, 2, 2); ctx.fillRect(3, -20, 2, 2);
        ctx.fillStyle = hair || '#000'; ctx.fillRect(-10, -30, 20, 8);
        
        // Pirate Hat Rendering
        if (isP1 && hasPirateMedal) {
            ctx.fillStyle = '#111'; ctx.beginPath(); ctx.moveTo(-15, -28); ctx.lineTo(15, -28); ctx.lineTo(10, -38); ctx.lineTo(-10, -38); ctx.fill(); // Hat base
            ctx.fillStyle = '#facc15'; ctx.fillRect(-4, -34, 8, 4); // Skull badge
        }

        const hasRacket = isP1 ? equipped.racket !== 'none' : true;
        if(hasRacket && (gameState.includes('MATCH') || (isP1 && (gameState === 'OVERWORLD' || gameState === 'HOUSE')))) { 
            ctx.save(); ctx.translate(isP1 ? 16 : -16, 0); if(swing > 0) ctx.rotate(isP1 ? -Math.PI/2 : Math.PI/2); 
            const ss = (isP1) ? player.stats.racketSize : 1.0; 
            ctx.scale(1, ss); 
            
            ctx.fillStyle = racketColor || '#eee'; ctx.fillRect(-2, -5, 4, 15);
            // Netting
            if (equipped.racket !== 'racket_basic') {
                ctx.globalAlpha = 0.4; ctx.fillStyle = racketColor || '#eee'; ctx.fillRect(-10, -25, 20, 20); ctx.globalAlpha = 1.0;
            }
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(-10, -25, 20, 20); 
            ctx.restore(); 
        }
        ctx.restore();
    }

    function drawPreviewIcon(ictx, item) {
        ictx.clearRect(0,0,60,60); ictx.save(); ictx.translate(30, 35); ictx.scale(2, 2);
        if (item.type === 'boat') { 
            ictx.fillStyle = '#78350f'; ictx.beginPath(); ictx.moveTo(-15, 0); ictx.lineTo(15, 0); ictx.lineTo(10, 10); ictx.lineTo(-10, 10); ictx.fill(); 
        } else {
            let s = (item.type === 'suit') ? item.val : player.suit; 
            let h = (item.type === 'hair') ? item.val : player.hair;
            ictx.fillStyle = s; ictx.fillRect(-6, -10, 12, 10); 
            ictx.fillStyle = '#ffdbac'; ictx.fillRect(-4, -18, 8, 8); 
            ictx.fillStyle = h; ictx.fillRect(-5, -20, 10, 4);
            ictx.save(); ictx.translate(8, -5); 
            let r = (item.type === 'racket') ? item.val : '#eee';
            ictx.fillStyle = r; ictx.fillRect(-1, -2, 2, 8); 
            if (item.type === 'racket' && item.id !== 'racket_basic') {
                ictx.globalAlpha = 0.4; ictx.fillStyle = item.val; ictx.fillRect(-10, -25, 20, 20); ictx.globalAlpha = 1.0;
            }
            ictx.strokeStyle = '#fff'; ictx.lineWidth = 1; ictx.strokeRect(-4, -8, 8, 8);
            ictx.restore();
        }
        ictx.restore();
    }

        wctx.beginPath(); wctx.arc(1207, 606, 4, 0, Math.PI * 2); wctx.fill(); // right eye
        wctx.beginPath(); wctx.moveTo(1196, 618); wctx.lineTo(1200, 622); wctx.lineTo(1204, 618); wctx.fill(); // nose

        wctx.beginPath(); wctx.arc(1200, 590, 90, 0, Math.PI * 2); wctx.stroke();

        // Winding dirt path (border then fill)

    function distToSegment(px, py, ax, ay, bx, by) {
        const dx = bx - ax, dy = by - ay;
        const len2 = dx*dx + dy*dy;
        if (len2 === 0) return Math.hypot(px - ax, py - ay);
        let t = ((px - ax)*dx + (py - ay)*dy) / len2;
        t = Math.max(0, Math.min(1, t));
        return Math.hypot(px - (ax + t*dx), py - (ay + t*dy));
    }

    function isOnVolcanoPath(x, y) {
        for (let i = 0; i < VOLCANO_PATH.length - 1; i++) {
            const a = VOLCANO_PATH[i], b = VOLCANO_PATH[i+1];
            if (distToSegment(x, y, a.x, a.y, b.x, b.y) < VOLCANO_PATH_WIDTH) return true;
        }
        return false;
    }

    function isOnVolcanoIsland(x, y) {
        return Math.hypot(x - VOLCANO_CENTER.x, y - VOLCANO_CENTER.y) < VOLCANO_ISLAND_RADIUS;
    }

    let prePauseState = null;

    function togglePause() {
        if (gameState === 'MENU' || gameState === 'SHOP') return;
        const pauseEl = document.getElementById('pause-menu');
        const forfeitBtn = document.getElementById('pause-forfeit-btn');
        if (gameState === 'PAUSED') {
            gameState = prePauseState || 'OVERWORLD';
            pauseEl.style.display = 'none';
        } else {
            prePauseState = gameState;
            gameState = 'PAUSED';
            pauseEl.style.display = 'flex';
            forfeitBtn.style.display = prePauseState.includes('MATCH') ? 'block' : 'none';
        }
    }

    function forfeitMatch() {
        gameState = 'DIALOG';
        document.getElementById('pause-menu').style.display = 'none';
        document.getElementById('match-score').style.display = 'none';
        document.getElementById('top-bar').style.display = 'flex';
        document.getElementById('special-meter-container').style.display = 'none';
        document.getElementById('dialog').style.display = 'block';
        document.getElementById('dialog-text').innerText = "You forfeited the match.";
        matchStats.currentStreak = 0; tournamentRound = 0;
        if(activeNPC) activeNPC.action = 'EXIT';
        const rematchBtn = document.getElementById('dialog-rematch-btn');
        if (activeNPC && !['bully','bully_done'].includes(activeNPC.type)) { rematchBtn.style.display = 'inline-block'; } else { rematchBtn.style.display = 'none'; }
    }

    function update() {
        updateAchievementPopup();
        if (gameState === 'MENU' || gameState === 'PAUSED') return;
        if(['OVERWORLD', 'ADMIN', 'DIALOG', 'TUTORIAL', 'HOUSE'].includes(gameState)) {
            let dx = 0, dy = 0;
            const oldX = player.x, oldY = player.y;
            const spd = player.speed * player.stats.moveSpeed;
            if(keys['KeyW'] || keys['ArrowUp']) { dy = -spd; player.dir = 'up'; }
            if(keys['KeyS'] || keys['ArrowDown']) { dy = spd; player.dir = 'down'; }
            if(keys['KeyA'] || keys['ArrowLeft']) { dx = -spd; player.dir = 'left'; }
            if(keys['KeyD'] || keys['ArrowRight']) { dx = spd; player.dir = 'right'; }
            if (dx||dy) { player.x += dx; player.y += dy; animTimer++; if(animTimer > 10) { player.animFrame = 1-player.animFrame; animTimer=0; }}

            if (gameState === 'HOUSE') { player.x = Math.max(50, Math.min(750, player.x)); player.y = Math.max(320, Math.min(550, player.y)); }
            else {
                if (player.y < OCEAN_LIMIT && !inventory.includes('boat')) player.y = OCEAN_LIMIT;
                player.x = Math.max(20, Math.min(WORLD_W-20, player.x));
                player.y = Math.max(20, Math.min(WORLD_H-20, player.y));

                // Volcano path restriction
                if (isOnVolcanoIsland(player.x, player.y) && !isOnVolcanoPath(player.x, player.y)) {
                    if (isOnVolcanoPath(player.x, oldY)) { player.y = oldY; }
                    else if (isOnVolcanoPath(oldX, player.y)) { player.x = oldX; }
                    else { player.x = oldX; player.y = oldY; }
                }
                // Volcano NPC guard blocking
                for (const n of NPCs) {
                    if ((n.type === 'volcano_guard' || n.type === 'volcano_boss') && !defeatedVolcano.includes(n.volcanoId)) {
                        if (Math.hypot(player.x - n.x, player.y - n.y) < 40) {
                            player.x = oldX; player.y = oldY; break;
                        }
                    }
                }

                camera.x = Math.max(0, Math.min(WORLD_W-800, player.x-400));
                camera.y = Math.max(0, Math.min(WORLD_H-600, player.y-300));

                // Update zone display
                const zd = document.getElementById('zone-display');
                if (zd) {
                    let zoneName = "Town Center";
                    if (isOnVolcanoIsland(player.x, player.y)) zoneName = "Volcano Island";
                    else if (player.y < OCEAN_LIMIT) zoneName = "The Ocean";
                    else {
                        const txS = WORLD_W/2 - 450, txE = WORLD_W/2 + 450;
                        const tyS = LAND_OFFSET + 450, tyE = LAND_OFFSET + 1350;
                        const relY = player.y - LAND_OFFSET;
                        if (player.x > txS && player.x < txE && player.y > tyS && player.y < tyE) zoneName = "Town Center";
                        else if (relY >= 0) {
                            if (player.x < WORLD_W/2 && relY < 900) zoneName = "Ice Zone";
                            else if (player.x >= WORLD_W/2 && relY < 900) zoneName = "Fire Zone";
                            else if (player.x >= WORLD_W/2 && player.y >= WORLD_H/2) zoneName = "Water Zone";
                            else zoneName = "Plant Zone";
                        }
                    }
                    if (!visitedZones.has(zoneName)) { visitedZones.add(zoneName); checkAchievements(); }
                    zd.innerText = zoneName;
                }
            }
        } else if(gameState.includes('MATCH')) {
            let friction = (activeNPC && activeNPC.zone === 'Ice') ? 0.92 : 0.85; 
            if(keys['ArrowLeft'] || keys['KeyA']) player.matchVX -= 0.9; if(keys['ArrowRight'] || keys['KeyD']) player.matchVX += 0.9;
            player.matchVX *= friction; match.p1.x += player.matchVX * player.stats.moveSpeed; match.p1.x = Math.max(40, Math.min(760, match.p1.x));
            const cpuSpeed = Math.min(8.5, 2.4 + (activeNPC ? activeNPC.level * 0.7 : 0.5)); if(match.ball.x < match.cpu.x - 10) match.cpu.x -= cpuSpeed; if(match.ball.x > match.cpu.x + 10) match.cpu.x += cpuSpeed;
            if (activeNPC && (activeNPC.type === 'boss' || activeNPC.type === 'volcano_boss')) {
                match.bossObstacle.x += match.bossObstacle.vx; if (match.bossObstacle.x < 150 || match.bossObstacle.x > 650) match.bossObstacle.vx *= -1;
                if (match.active && Math.abs(match.ball.y - match.bossObstacle.y) < 15 && Math.abs(match.ball.x - match.bossObstacle.x) < match.bossObstacle.w/2) { if (match.ball.vy < 0) { match.ball.vy = Math.abs(match.ball.vy); playSfx(100, 'sawtooth', 0.2); shakeIntensity = 8; } }
            }
            // Volcano boss eruption timer
            if (activeNPC && activeNPC.type === 'volcano_boss' && match.volcanoTimer > 0) {
                match.volcanoTimer--;
                if (match.volcanoTimer <= 0) {
                    match.volcanoErupting = true; shakeIntensity = 30;
                    playSfx(80, 'sawtooth', 1.0, 0.15);
                    // Force loss — set cpu score to goal
                    match.cpu.score = 11; match.p1.score = Math.min(match.p1.score, 10);
                    document.getElementById('cpu-score').innerText = match.cpu.score;
                    gameState = 'DIALOG'; document.getElementById('match-score').style.display = 'none'; document.getElementById('top-bar').style.display = 'flex'; document.getElementById('ach-btn').style.display = 'block'; document.getElementById('special-meter-container').style.display = 'none'; document.getElementById('dialog').style.display = 'block';
                    document.getElementById('dialog-text').innerText = "THE VOLCANO ERUPTS! The ground shakes violently... You flee the summit! Chad wins by default!";
                    activeNPC.action = 'EXIT'; tournamentRound = 0; matchStats.currentStreak = 0;
                    saveGameData(); updateObjectiveHint();
                    const rematchBtn = document.getElementById('dialog-rematch-btn');
                    rematchBtn.style.display = 'inline-block';
                }
            }
            if(match.active) {
                if (activeNPC && activeNPC.zone === 'Water') { 
                    match.ball.vx *= 0.998; 
                    match.ball.vy *= 0.998;
                    if (Math.abs(match.ball.vy) < 2.5 && match.ball.vy !== 0) match.ball.vy = match.ball.vy > 0 ? 2.5 : -2.5;
                }
                match.ball.x += match.ball.vx; match.ball.y += match.ball.vy;
                match.ball.trail.push({x: match.ball.x, y: match.ball.y}); if(match.ball.trail.length > 8) match.ball.trail.shift();
                if(match.ball.x < 100 || match.ball.x > 700) { match.ball.vx *= -1; playSfx(200, 'sine', 0.1); }
                const hr = 45 * player.stats.racketSize;
                
                // FIRE BALL LOGIC
                const isFire = (activeNPC && activeNPC.zone === 'Fire');
                // Ball speed cap
                const MAX_BALL_SPEED = 16;
                if (Math.abs(match.ball.vy) > MAX_BALL_SPEED) match.ball.vy = Math.sign(match.ball.vy) * MAX_BALL_SPEED;
                if (Math.abs(match.ball.vx) > MAX_BALL_SPEED * 0.6) match.ball.vx = Math.sign(match.ball.vx) * MAX_BALL_SPEED * 0.6;

                // Player hit — sweep test to prevent tunneling
                const ballPrevY = match.ball.y - match.ball.vy;
                const p1HitTop = 530, p1HitBot = 550;
                const ballPassedP1 = (ballPrevY <= p1HitBot && match.ball.y >= p1HitTop) || (match.ball.y >= p1HitTop && match.ball.y <= p1HitBot);
                if(ballPassedP1 && match.ball.vy > 0 && Math.abs(match.ball.x - match.p1.x) < hr) {
                    let pwr = 1.05 * player.stats.racketPower;
                    if (isFire) pwr *= 1.25;
                    match.ball.vy = -Math.abs(match.ball.vy) * pwr; match.ball.vx = (match.ball.x - match.p1.x) * 0.25;
                    match.ball.y = p1HitTop;
                    match.p1.swing = 10; playSfx(600, 'square', 0.1); shakeIntensity = 4; match.p1.specialMeter = Math.min(100, match.p1.specialMeter + 10); match.ball.special = false;
                    matchStats.currentRally++; if (matchStats.currentRally > matchStats.bestRally) matchStats.bestRally = matchStats.currentRally;
                    if (match.p1.specialMeter >= 100) { match.p1.specialMeter = 0; match.ball.special = true; playSfx(1200, 'sawtooth', 0.3, 0.1); shakeIntensity = 15; match.ball.vy *= 2; if (gameState !== 'TUTORIAL_MATCH') { matchStats.specialsUsed++; checkAchievements(); } }
                }
                // CPU hit — sweep test
                const cpuHitTop = 50, cpuHitBot = 70;
                const ballPassedCpu = (ballPrevY >= cpuHitTop && match.ball.y <= cpuHitBot) || (match.ball.y >= cpuHitTop && match.ball.y <= cpuHitBot);
                if(ballPassedCpu && match.ball.vy < 0 && Math.abs(match.ball.x - match.cpu.x) < 45) { match.ball.vy = Math.abs(match.ball.vy) * 1.05; match.ball.vx = (match.ball.x - match.cpu.x) * 0.25; match.ball.y = cpuHitBot; match.cpu.swing = 10; playSfx(600, 'square', 0.1); match.ball.special = false; matchStats.currentRally++; if (matchStats.currentRally > matchStats.bestRally) matchStats.bestRally = matchStats.currentRally; }
                if(match.ball.y < 0) score('p1'); else if(match.ball.y > 600) score('cpu');
            }
            document.getElementById('special-meter-fill').style.width = match.p1.specialMeter + '%';
            const meterEl = document.getElementById('special-meter-container');
            if (match.p1.specialMeter >= 100) meterEl.classList.add('meter-ready'); else meterEl.classList.remove('meter-ready');
            if(match.p1.swing > 0) match.p1.swing--; if(match.cpu.swing > 0) match.cpu.swing--;
        }
        if(shakeIntensity > 0) shakeIntensity *= 0.9;
    }

                if (beaten) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke(); }

            ctx.fillStyle = (gameState === 'TUTORIAL_MATCH') ? colors.Tutorial : (colors[activeNPC.zone] || '#2d5a27'); ctx.fillRect(0,0,800,600);

            // Volcano boss eruption timer bar
            if (activeNPC && activeNPC.type === 'volcano_boss' && match.volcanoTimer > 0) {
                const pct = match.volcanoTimer / match.volcanoTimerMax;
                const barW = 200, barH = 14, barX = 400 - barW/2, barY = 575;
                ctx.fillStyle = '#111'; ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
                const timerColor = pct > 0.4 ? '#ef4444' : (pct > 0.15 ? '#f97316' : '#fbbf24');
                ctx.fillStyle = timerColor; ctx.fillRect(barX, barY, barW * pct, barH);
                if (pct <= 0.15) { ctx.globalAlpha = 0.3 + Math.sin(Date.now() / 80) * 0.3; ctx.fillStyle = '#fff'; ctx.fillRect(barX, barY, barW * pct, barH); ctx.globalAlpha = 1; }

                    ctx.fillStyle = `rgba(239, 68, 68, ${glowAlpha * 0.5})`; ctx.fillRect(0, 0, 800, 15); ctx.fillRect(0, 585, 800, 15);
                }
            }
            // Eruption flash
            if (match.volcanoErupting) { ctx.fillStyle = 'rgba(239,68,68,0.5)'; ctx.fillRect(0,0,800,600); match.volcanoErupting = false; }
        }
        ctx.restore();
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    // --- 5. INITIALIZATION ---

    async function init() {
        renderWorld();
        
        const bindUI = (id, fn) => {
            const el = document.getElementById(id);
            if (el) el.onclick = fn;
        };

        bindUI('dialog-confirm-btn', () => { document.getElementById('dialog-rematch-btn').style.display = 'none'; handleDialogAction(); });
        bindUI('dialog-rematch-btn', () => { document.getElementById('dialog-rematch-btn').style.display = 'none'; document.getElementById('dialog').style.display = 'none'; if(activeNPC) { activeNPC.action = 'MATCH'; startStandardMatch(); } });
        bindUI('shop-exit-btn', () => { gameState = 'OVERWORLD'; document.getElementById('shop').style.display = 'none'; });
        bindUI('admin-close-btn', () => { document.getElementById('admin-panel').style.display = 'none'; });
        bindUI('debug-toggle', () => { 
            const p = document.getElementById('admin-panel');
            if(p) p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        });
        bindUI('admin-add-rep-btn', () => { rep += 500; if(document.getElementById('rep-val')) document.getElementById('rep-val').innerText = rep; saveGameData(); });
        bindUI('admin-medal-btn', () => { hasGoldMedal = true; if(document.getElementById('medal-icon')) document.getElementById('medal-icon').classList.remove('hidden'); saveGameData(); });
        
        const bindCheck = (id) => {
            const el = document.getElementById(id);
            if(el) el.onchange = adminUpdateGyms;
        }
        ['check-plant', 'check-ice', 'check-water', 'check-fire'].forEach(bindCheck);

        bindUI('pause-resume-btn', () => togglePause());
        bindUI('pause-forfeit-btn', () => forfeitMatch());

        window.addEventListener('keydown', e => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            keys[e.code] = true;
            if(e.code === 'Escape') togglePause();
            if(e.code === 'Space' && gameState !== 'PAUSED') handleSpace();
            // Special now auto-triggers on ball hit when meter is full
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        if (firebaseOk) {
            await signInAnonymously(auth_init);
            onAuthStateChanged(auth_init, (u) => { user = u; if (u) scanSlots(); });
        } else {
            user = { uid: 'local' };
            scanSlots();
        }

        musicLoop();
        loop();
    }
