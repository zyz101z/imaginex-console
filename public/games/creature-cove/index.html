<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Creature Cove</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #071420; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; color: #dff2f0; user-select: none; }
  #cv { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; }

  /* ---------- top bar ---------- */
  #topbar {
    position: absolute; top: 0; left: 0; right: 0; height: 52px; display: flex; gap: 10px;
    align-items: center; padding: 0 12px; pointer-events: none; z-index: 10;
    background: linear-gradient(180deg, rgba(4,12,20,0.85), rgba(4,12,20,0));
  }
  .pill {
    display: flex; align-items: center; gap: 6px; background: rgba(10,26,38,0.9);
    border: 1px solid rgba(120,220,200,0.25); border-radius: 20px; padding: 5px 14px;
    font-weight: 800; font-size: 15px; pointer-events: auto;
  }
  .pill .ic { font-size: 16px; }
  #goldPill { color: #ffd166; } #foodPill { color: #9be36e; } #padPill { color: #7fd8c8; }
  #titleTag { margin-left: auto; font-weight: 900; letter-spacing: 2px; color: #7fd8c8; opacity: 0.85; font-size: 13px; }

  /* ---------- bottom nav ---------- */
  #nav {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; z-index: 10;
  }
  .navBtn {
    min-width: 74px; padding: 10px 16px; border-radius: 14px; border: 1.5px solid rgba(120,220,200,0.35);
    background: rgba(10,26,38,0.92); color: #dff2f0; font-weight: 800; font-size: 14px;
    cursor: pointer; text-align: center; transition: transform 0.08s;
  }
  .navBtn:active { transform: scale(0.94); }
  .navBtn .big { font-size: 20px; display: block; }
  .navBtn.glow { border-color: #ffd166; box-shadow: 0 0 14px rgba(255,209,102,0.35); }

  /* ---------- modals ---------- */
  #modalWrap {
    position: absolute; inset: 0; background: rgba(3,9,15,0.72); z-index: 20; display: none;
    align-items: center; justify-content: center;
  }
  #modal {
    width: min(560px, 94vw); max-height: 86vh; background: linear-gradient(180deg, #0d2233, #081826);
    border: 1.5px solid rgba(120,220,200,0.4); border-radius: 18px; padding: 18px;
    display: flex; flex-direction: column; overflow: hidden;
  }
  #modalTitle { font-size: 19px; font-weight: 900; letter-spacing: 1px; color: #7fd8c8; margin-bottom: 10px; display: flex; align-items: center; }
  #modalBody { overflow-y: auto; flex: 1; }
  .closeX {
    margin-left: auto; background: rgba(255,255,255,0.08); border: none; color: #9fb8c8;
    width: 32px; height: 32px; border-radius: 10px; font-size: 15px; font-weight: 900; cursor: pointer;
  }
  .tabRow { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .tab {
    padding: 7px 13px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid transparent;
    color: #9fb8c8; font-weight: 800; font-size: 13px; cursor: pointer;
  }
  .tab.on { background: rgba(127,216,200,0.15); border-color: rgba(127,216,200,0.5); color: #7fd8c8; }

  .card {
    display: flex; gap: 12px; align-items: center; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(120,220,200,0.18); border-radius: 14px; padding: 10px 12px; margin-bottom: 8px;
  }
  .card.sel { border-color: #ffd166; }
  .cardArt { width: 58px; height: 58px; display: flex; align-items: center; justify-content: center; flex: none; position: relative; }
  .cardArt img { max-width: 100%; max-height: 100%; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.5)); }
  .cardArt .emo { font-size: 40px; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.5)); }
  .cardInfo { flex: 1; min-width: 0; }
  .cardName { font-weight: 900; font-size: 15px; }
  .cardSub { font-size: 12px; color: #9fb8c8; margin-top: 2px; }
  .cardBtn {
    flex: none; padding: 9px 14px; border-radius: 11px; border: 1.5px solid rgba(127,216,200,0.5);
    background: rgba(127,216,200,0.12); color: #7fd8c8; font-weight: 900; font-size: 13px; cursor: pointer;
  }
  .cardBtn.gold { border-color: rgba(255,209,102,0.6); background: rgba(255,209,102,0.12); color: #ffd166; }
  .cardBtn.cant { opacity: 0.4; cursor: default; }
  .cardBtn.green { border-color: rgba(155,227,110,0.6); background: rgba(155,227,110,0.12); color: #9be36e; }

  /* breed slots */
  .slotRow { display: flex; gap: 12px; justify-content: center; align-items: center; margin: 8px 0 14px; }
  .bSlot {
    width: 96px; height: 96px; border-radius: 16px; border: 2px dashed rgba(127,216,200,0.4);
    display: flex; align-items: center; justify-content: center; font-size: 44px; background: rgba(255,255,255,0.03);
    position: relative;
  }
  .bSlot .lvl { position: absolute; bottom: 4px; right: 6px; font-size: 11px; font-weight: 800; color: #9fb8c8; }
  .heartMid { font-size: 26px; }
  .unionTag { text-align: center; font-size: 14px; color: #9fb8c8; margin-bottom: 10px; min-height: 20px; }
  .goBtn {
    display: block; margin: 4px auto 2px; padding: 12px 34px; border-radius: 14px; font-size: 16px;
    font-weight: 900; border: 2px solid rgba(255,120,170,0.65); background: rgba(255,120,170,0.15);
    color: #ff9ec2; cursor: pointer;
  }
  .goBtn.cant { opacity: 0.4; cursor: default; }

  /* bestiary grid */
  .bGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
  .bCard {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(120,220,200,0.18); border-radius: 12px;
    padding: 10px; text-align: center;
  }
  .bCard .emo { font-size: 40px; height: 52px; display: flex; align-items: center; justify-content: center; }
  .bCard img { max-height: 52px; max-width: 90%; }
  .bCard .nm { font-weight: 900; font-size: 13px; margin-top: 4px; }
  .bCard .els { font-size: 13px; margin-top: 2px; }
  .bCard .pips { margin-top: 5px; font-size: 12px; letter-spacing: 3px; }
  .bCard.locked { opacity: 0.55; }
  .bCard.locked .emo, .bCard.locked img { filter: brightness(0) opacity(0.5); }

  /* selection panel */
  #selPanel {
    position: absolute; bottom: 74px; left: 50%; transform: translateX(-50%); z-index: 12;
    background: rgba(8,22,34,0.96); border: 1.5px solid rgba(127,216,200,0.45); border-radius: 16px;
    padding: 10px 14px; display: none; gap: 10px; align-items: center; max-width: 94vw;
  }
  #selPanel .who { font-weight: 900; font-size: 14px; margin-right: 4px; }
  #selPanel .sub { font-size: 12px; color: #9fb8c8; }
  .selBtn {
    padding: 8px 13px; border-radius: 11px; border: 1.5px solid rgba(155,227,110,0.5);
    background: rgba(155,227,110,0.1); color: #9be36e; font-weight: 900; font-size: 13px; cursor: pointer;
  }

  /* hatch overlay */
  #hatchWrap {
    position: absolute; inset: 0; z-index: 30; display: none; align-items: center; justify-content: center;
    background: rgba(3,9,15,0.85); flex-direction: column; gap: 16px;
  }
  #hatchEgg { font-size: 110px; transition: transform 0.1s; cursor: pointer; filter: drop-shadow(0 6px 20px rgba(0,0,0,0.6)); }
  #hatchEgg img { height: 150px; }
  #hatchName { font-size: 26px; font-weight: 900; letter-spacing: 1px; color: #ffd166; text-align: center; min-height: 36px; }
  #hatchSub { font-size: 15px; color: #9fb8c8; text-align: center; }
  #hatchBtn {
    padding: 12px 30px; border-radius: 14px; font-size: 16px; font-weight: 900;
    border: 2px solid rgba(255,209,102,0.65); background: rgba(255,209,102,0.15); color: #ffd166; cursor: pointer;
  }

  #hatchRays {
    position: absolute; width: 480px; height: 480px; border-radius: 50%; opacity: 0;
    background: conic-gradient(rgba(255,209,102,0.35) 0 12deg, transparent 12deg 30deg,
      rgba(255,209,102,0.35) 30deg 42deg, transparent 42deg 60deg, rgba(255,209,102,0.35) 60deg 72deg,
      transparent 72deg 90deg, rgba(255,209,102,0.35) 90deg 102deg, transparent 102deg 120deg,
      rgba(255,209,102,0.35) 120deg 132deg, transparent 132deg 150deg, rgba(255,209,102,0.35) 150deg 162deg,
      transparent 162deg 180deg, rgba(255,209,102,0.35) 180deg 192deg, transparent 192deg 210deg,
      rgba(255,209,102,0.35) 210deg 222deg, transparent 222deg 240deg, rgba(255,209,102,0.35) 240deg 252deg,
      transparent 252deg 270deg, rgba(255,209,102,0.35) 270deg 282deg, transparent 282deg 300deg,
      rgba(255,209,102,0.35) 300deg 312deg, transparent 312deg 330deg, rgba(255,209,102,0.35) 330deg 342deg,
      transparent 342deg 360deg);
    animation: raysSpin 14s linear infinite; transition: opacity 0.5s; pointer-events: none;
  }
  @keyframes raysSpin { to { transform: rotate(360deg); } }
  #hatchFlash { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; transition: opacity 0.45s; }
  @keyframes popIn { 0% { transform: scale(0); } 55% { transform: scale(1.22); } 75% { transform: scale(0.94); } 100% { transform: scale(1); } }
  .popIn { animation: popIn 0.55s cubic-bezier(0.2, 1.2, 0.4, 1) both; }
  .chip { position: absolute; width: 11px; height: 11px; border-radius: 3px; pointer-events: none; transition: transform 0.9s cubic-bezier(0.15, 0.6, 0.4, 1), opacity 0.9s; }

  /* toasts */
  #toasts { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); z-index: 25; display: flex; flex-direction: column; gap: 6px; align-items: center; pointer-events: none; }
  .toast {
    background: rgba(8,22,34,0.95); border: 1px solid rgba(255,209,102,0.5); color: #ffd166;
    border-radius: 12px; padding: 8px 18px; font-weight: 800; font-size: 14px; animation: tIn 0.25s ease-out;
  }
  @keyframes tIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }

  #collectAllBtn {
    position: absolute; right: 12px; bottom: 86px; z-index: 11;
    padding: 12px 18px; border-radius: 16px; font-size: 15px; font-weight: 900;
    border: 2px solid rgba(255,209,102,0.7); background: rgba(60,45,10,0.92); color: #ffd166;
    cursor: pointer; box-shadow: 0 0 16px rgba(255,209,102,0.25);
    animation: caPulse 1.6s ease-in-out infinite;
  }
  #collectAllBtn:active { transform: scale(0.94); }
  @keyframes caPulse { 0%,100% { box-shadow: 0 0 10px rgba(255,209,102,0.2); } 50% { box-shadow: 0 0 22px rgba(255,209,102,0.5); } }
  .muteBtn {
    position: absolute; top: 58px; right: 10px; z-index: 11; background: rgba(10,26,38,0.9);
    border: 1px solid rgba(120,220,200,0.3); color: #7fd8c8; border-radius: 10px; padding: 6px 10px;
    font-weight: 800; font-size: 12px; cursor: pointer;
  }
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div id="topbar">
  <div class="pill" id="goldPill"><span class="ic">🪙</span><span id="goldVal">0</span></div>
  <div class="pill" id="foodPill"><span class="ic">🍖</span><span id="foodVal">0</span></div>
  <div class="pill" id="padPill"><span class="ic">🏠</span><span id="padVal">0/6</span></div>
  <div id="titleTag">CREATURE COVE</div>
</div>
<button class="muteBtn" id="muteBtn">♪ ON</button>

<button id="collectAllBtn" style="display:none">💰 Collect All</button>

<div id="nav">
  <button class="navBtn" id="navBreed"><span class="big">💕</span>Breed</button>
  <button class="navBtn" id="navShop"><span class="big">🏪</span>Shop</button>
  <button class="navBtn" id="navQuest"><span class="big">📜</span>Requests</button>
  <button class="navBtn" id="navBook"><span class="big">📖</span>Bestiary</button>
  <button class="navBtn" id="navBoard"><span class="big">🏆</span>Ranks</button>
</div>

<div id="selPanel"></div>

<div id="modalWrap"><div id="modal">
  <div id="modalTitle"><span id="modalTitleText"></span><button class="closeX" id="modalClose">✕</button></div>
  <div id="modalBody"></div>
</div></div>

<div id="hatchWrap">
  <div id="hatchRays"></div>
  <div id="hatchEgg">🥚</div>
  <div id="hatchName"></div>
  <div id="hatchSub"></div>
  <button id="hatchBtn" style="display:none">PLACE IN COVE</button>
  <div id="hatchFlash"></div>
</div>

<div id="toasts"></div>

<script>
(() => {
'use strict';

// Older Safari/WebViews lack ctx.roundRect — without this, every timer pill throws
// mid-frame and the scene strobes (draws up to the throw point, then dies).
if (typeof CanvasRenderingContext2D !== 'undefined' && !CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    if (typeof r === 'object') r = r[0] || 0;
    r = Math.min(Math.abs(r), Math.abs(w) / 2, Math.abs(h) / 2) || 0;
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    this.closePath();
    return this;
  };
}

// ?safe=1 — disables the newest visual layers (variant rings/motes, roamers, cove tree,
// day/night tint, fireflies) to bisect rendering glitches on specific devices.
const SAFE_MODE = /(\?|&)safe=1/.test(typeof location !== 'undefined' ? location.search : '');

// ============================== DATA ==============================
// Four elements. 15 species fill the lattice exactly (see GAME_DESIGN.md).
const EL_ICON = { E: '🪨', M: '✨', N: '🌙', B: '🐾' };
const SPECIES = {
  gnome:   { name: 'Gnome',   el: 'E',    tier: 0, gpm: 0.8, breedMin: 1,   food: 10,  cost: 50,    emo: '🍄', lore: 'Small, grumpy, excellent at digging up shiny things.' },
  fairy:   { name: 'Fairy',   el: 'M',    tier: 0, gpm: 1.0, breedMin: 1,   food: 10,  cost: 150,   emo: '🧚', lore: 'Pays rent in gold dust and mischief.' },
  zombie:  { name: 'Zombie',  el: 'N',    tier: 0, gpm: 1.2, breedMin: 1,   food: 10,  cost: 300,   emo: '🧟', lore: 'Slow, cheerful, surprisingly good with money.' },
  bigfoot: { name: 'Bigfoot', el: 'B',    tier: 0, gpm: 1.5, breedMin: 1,   food: 10,  cost: 500,   emo: '🦶', lore: 'Blurry in photos. Crisp in earnings.' },
  genie:   { name: 'Genie',   el: 'EM',   tier: 1, gpm: 4,   breedMin: 2,   food: 25,  cost: 1500,  emo: '🧞', lore: 'Grants wishes. Mostly wishes for more gold.' },
  giant:   { name: 'Giant',   el: 'EN',   tier: 1, gpm: 5,   breedMin: 3,   food: 25,  cost: 1500,  emo: '🗿', lore: 'Slept beneath the hills for a thousand years. Still tired.' },
  ogre:    { name: 'Ogre',    el: 'EB',   tier: 1, gpm: 5,   breedMin: 3,   food: 25,  cost: 1500,  emo: '👹', lore: 'Big club, bigger heart, biggest appetite.' },
  vampire: { name: 'Vampire', el: 'MN',   tier: 1, gpm: 6,   breedMin: 4,   food: 25,  cost: 1500,  emo: '🧛', lore: 'Works the night shift. Prefers it that way.' },
  unicorn: { name: 'Unicorn', el: 'MB',   tier: 1, gpm: 6,   breedMin: 4,   food: 25,  cost: 1500,  emo: '🦄', lore: 'Majestic, sparkly, judges your lair decor.' },
  yeti:    { name: 'Yeti',    el: 'NB',   tier: 1, gpm: 7,   breedMin: 5,   food: 25,  cost: 1500,  emo: '⛄', lore: 'Haunts the dark peaks. Loves hot cocoa.' },
  phoenix: { name: 'Phoenix', el: 'EMN',  tier: 2, gpm: 16,  breedMin: 20,  food: 60,  cost: 8000,  emo: '🐦‍🔥', lore: 'Dies in the night, rises from the ashes. Repeat.' },
  pegasus: { name: 'Pegasus', el: 'EMB',  tier: 2, gpm: 16,  breedMin: 20,  food: 60,  cost: 8000,  emo: '🪽', lore: 'Sky pony. Better than a regular pony.' },
  griffin: { name: 'Griffin', el: 'ENB',  tier: 2, gpm: 18,  breedMin: 30,  food: 60,  cost: 8000,  emo: '🦅', lore: 'Half eagle, half lion, all business.' },
  nessie:  { name: 'Loch Ness Monster', el: 'MNB', tier: 2, gpm: 18, breedMin: 30, food: 60, cost: 8000, emo: '🦕', lore: 'The cove is named after her. She knows it.', water: true },
  dragon:  { name: 'DRAGON',  el: 'EMNB', tier: 3, gpm: 50,  breedMin: 120, food: 150, cost: 50000, emo: '🐉', lore: 'All four elements. The crown of the cove.' },
};
const SP_KEYS = Object.keys(SPECIES);
const TIER_WEIGHT = [30, 25, 12, 5];
const PARENT_SHY = 0.4;   // the den likes making something NEW: parents at 40% weight (user tune)

// Variants: gold multiplier / breed-time multiplier (user-set: rare 2x/2x, epic 4x/3x)
const VARIANTS = {
  normal: { name: '',      g: 1, t: 1, icon: '' },
  rare:   { name: 'Rare',  g: 2, t: 2, icon: '✨' },
  epic:   { name: 'Epic',  g: 4, t: 3, icon: '🌟' },
};
// Variant odds by parents' variant ranks (sorted hi,lo): [rare%, epic%]
const VAR_ODDS = { '00': [5, 0], '10': [12, 0], '11': [30, 10], '20': [15, 0], '21': [30, 15], '22': [30, 25] };
const VRANK = { normal: 0, rare: 1, epic: 2 };

const EXPANSIONS = [ { pads: 6, cost: 0 }, { pads: 8, cost: 500 }, { pads: 10, cost: 2000 }, { pads: 13, cost: 8000 }, { pads: 16, cost: 25000 }, { pads: 20, cost: 75000 } ];
const FARM_COSTS = [200, 1000, 5000];
const FOOD_BATCHES = [
  { gold: 50,  food: 25,  min: 3 },
  { gold: 200, food: 120, min: 10 },
  { gold: 800, food: 550, min: 30 },
];
const VAULT_COST = 3000, DEN2_COST = 30000;
const DECOR = [
  { id: 'mush',    name: 'Glow Mushrooms', emo: '🍄', cost: 100 },
  { id: 'torch',   name: 'Cove Torch',     emo: '🔥', cost: 250 },
  { id: 'fount',   name: 'Fairy Fountain', emo: '⛲', cost: 600 },
  { id: 'banner',  name: 'Cove Banner',    emo: '🚩', cost: 1200 },
  { id: 'crystal', name: 'Moon Crystal',   emo: '💎', cost: 3000 },
  { id: 'statue',  name: 'Golden Dragon Statue', emo: '🐲', cost: 8000 },
  { id: 'arch',    name: 'Rainbow Arch',   emo: '🌈', cost: 15000 },
  { id: 'throne',  name: 'Mythic Throne',  emo: '👑', cost: 25000 },
];
const LEVEL_MAX = 10;
// EXPEDITIONS ("The Wilds"): send an idle creature adventuring. Rewards scale with the
// creature's earning power; longer trips = better bonus odds. egg/decor are % chances.
const EXPEDITIONS = [
  { name: 'Whispering Woods', emo: '🌲', min: 30,  egg: 10, decor: 5 },
  { name: 'Crystal Caverns',  emo: '💎', min: 60,  egg: 18, decor: 8 },
  { name: 'Ember Peaks',      emo: '🌋', min: 120, egg: 30, decor: 12 },
];

// ============================== TIME & RNG (test-hookable) ==============================
let _nowOffset = 0;
const now = () => Date.now() + _nowOffset;
let rng = Math.random;

// ============================== STATE ==============================
// creature: { id, sp, v, lvl, bank, t0 }  bank=banked uncollected gold, t0=accrual anchor
let S = null;
let creatureSeq = 0;

function defaultState() {
  return {
    v: 1,
    gold: 100, food: 0, lifetime: 0,
    creatures: [],
    expansion: 0,                       // index into EXPANSIONS
    farms: [],                          // per farm: null | { food, readyAt }
    vault: false, den2: false,
    decor: {},                          // id -> count
    breeds: [null, null],               // per den: null | { aId, bId, sp, v, readyAt }
    expedition: null,                   // { cId, dest, readyAt }
    quests: null,                       // { day, list[3], chestClaimed }
    treeStage: 0,
    shrines: { E: 0, M: 0, N: 0, B: 0 },
    egg: null,                          // { sp, v, readyAt }  (nursery)
    disc: {},                           // 'sp:variant' -> true
    lastSeen: now(),
    seq: 0,
    name: '',
  };
}

function save() {
  S.lastSeen = now(); S.seq = creatureSeq;
  // strip _-prefixed transients (render caches like _petT/_px) — a leaked _petT once
  // corrupted the pet animation after reload
  try { localStorage.setItem('creaturecove_save', JSON.stringify(S, (k, v) => (k && k[0] === '_' ? undefined : v))); } catch (e) {}
}
function load() {
  let raw = null;
  try { raw = localStorage.getItem('creaturecove_save'); } catch (e) {}
  if (!raw) { S = defaultState(); seedNewGame(); return false; }
  try { S = JSON.parse(raw); } catch (e) { S = defaultState(); seedNewGame(); return false; }
  if (!S || S.v !== 1) { S = defaultState(); seedNewGame(); return false; }
  creatureSeq = S.seq || 0;
  return true;
}
function seedNewGame() {
  // day-1 kickstart: a Gnome on pad 0 (shop tutorial covers the Fairy)
  addCreature('gnome', 'normal');
  S.disc['gnome:normal'] = true;
}

function addCreature(sp, v) {
  const c = { id: ++creatureSeq, sp, v, lvl: 1, bank: 0, t0: now() };
  S.creatures.push(c);
  return c;
}

// ============================== ECONOMY ==============================
const gpmOf = (c) => SPECIES[c.sp].gpm * VARIANTS[c.v].g * (1 + 0.25 * (c.lvl - 1)) * treeBonus() * shrineBonus(c);
const capMinOf = (c) => (60 + 10 * (c.lvl - 1)) * (S.vault ? 1.5 : 1);   // Vault: +50% storage
const capOf = (c) => gpmOf(c) * capMinOf(c);
const pendingOf = (c) => Math.min(capOf(c), c.bank + gpmOf(c) * (now() - c.t0) / 60000);
function bankNow(c) { c.bank = pendingOf(c); c.t0 = now(); }
function collect(c) {

// ============================== BREEDING ==============================

  let t = weights.reduce((a, b) => a + b, 0) * rng();

  return pool[pool.length - 1];

const isAway = (id) => !!(S.expedition && S.expedition.cId === id);

// ---------- expeditions ----------
// Rebalanced 2026-07-04 (user: L4 unicorn pulled 1700g/2h — double her storage cap):
// diminishing rate for longer trips, hard-capped at 1.2x what the creature could HOLD.

  S.expedition = { cId, dest: destIdx, readyAt: now() + dest.min * 60000 };

// Sell/release: 25% of shop cost, scaled by variant earnings (rare 2x, epic 4x) and a
// small level bonus. Guards: never the last creature, never one that's mid-breed.
function sellValue(c) {

// ---------- DAILY COVE REQUESTS ----------

    else if (type === 'feed') { q.target = 3; q.rFood = Math.max(40, Math.round(base * 8)); }

// ============================== LEADERBOARD ==============================
let lastSubmitted = 0;
function maybeSubmitScore() {
  if (S.lifetime - lastSubmitted < 10000 && lastSubmitted > 0) return;
  lastSubmitted = S.lifetime;
  const score = Math.min(100000000, Math.floor(S.lifetime));
  const nickname = (S.name || 'Player').slice(0, 20);
  // Inside the ImagineX console (iframe): postMessage — the console stamps the player's
  // real profile nickname and does the POST (the sibling-games contract).
  try {
    if (typeof window !== 'undefined' && window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'imaginex-score', gameId: 'creature-cove', score, nickname }, '*');
      return;
    }
  } catch (e) {}
  // Standalone (direct URL): POST with the API's actual field names.
  try {
    fetch('/api/leaderboard', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nickname, gameId: 'creature-cove', score }),
    }).catch(() => {});
  } catch (e) {}
}

    tone(82, 1.1, 'sine', 0.12, 0.45);
  },
  buy:   () => { tone(660, 0.09, 'square', 0.06); tone(880, 0.12, 'square', 0.05, 0.07); },
  err:   () => tone(160, 0.15, 'sawtooth', 0.06),
};

// ============================== DAY / NIGHT ==============================
// Real-clock ambiance: warm dawns, golden dusks, deep blue nights with fireflies.
// NIGHT-element creatures glow after dark. ?hour=22 forces an hour (QA/screenshots).
let forcedHour = null;
{ const hm = (typeof location !== 'undefined' ? location.search : '').match(/(?:\?|&)hour=([0-9.]+)/); if (hm) forcedHour = parseFloat(hm[1]); }
function gameHour() {
  if (forcedHour !== null) return forcedHour;
  const d = new Date();
  return d.getHours() + d.getMinutes() / 60;
}
const DN_KEYS = [   // hour -> multiply tint (white = untouched daylight)
  [0, [96, 116, 188]], [5, [96, 116, 188]], [6.5, [255, 224, 196]], [8, [255, 255, 255]],
  [16.5, [255, 255, 255]], [18.5, [255, 198, 140]], [20.5, [96, 116, 188]], [24, [96, 116, 188]],
];
function dnTint() {
  const h = gameHour() % 24;
  for (let i = 0; i < DN_KEYS.length - 1; i++) {
    const [h0, c0] = DN_KEYS[i], [h1, c1] = DN_KEYS[i + 1];
    if (h >= h0 && h <= h1) {
      const k = (h - h0) / ((h1 - h0) || 1);
      return c0.map((v, j) => Math.round(v + (c1[j] - v) * k));
    }
  }
  return [255, 255, 255];
}
const nightFactor = () => 1 - dnTint()[0] / 255;   // 0 by day, ~0.62 at deep night

// ============================== RENDER ==============================
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let VW = 0, VH = 0, DPR = 1, scale = 1, camX = 0;
function resize() {
  DPR = Math.min(2, window.devicePixelRatio || 1);
  VW = window.innerWidth; VH = window.innerHeight;
  cv.width = VW * DPR; cv.height = VH * DPR;
  scale = VH / WORLD_H;
  camX = Math.max(0, Math.min(camX, WORLD_W - VW / scale));
}
window.addEventListener('resize', resize);

let particles = [];
let eggFly = null;   // { t0, dur, x0, y0, x1, y1 } — the breeding->nursery hand-off flight
function puff(x, y, n, col, txt) {
  for (let i = 0; i < n; i++) particles.push({
    x, y, vx: (rng() - 0.5) * 90, vy: -60 - rng() * 90, life: 0.9, max: 0.9,
    col, txt: i === 0 ? txt : null, r: 3 + rng() * 3,
  });
}

const fmt = (n) => n >= 1e6 ? (n / 1e6).toFixed(1) + 'M' : n >= 10000 ? (n / 1000).toFixed(1) + 'k' : Math.floor(n).toString();
const fmtT = (ms) => {
  const s = Math.max(0, Math.ceil(ms / 1000));
  if (s >= 3600) return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm';
  if (s >= 60) return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
  return s + 's';
};

function drawScene(t) {
  const tint = dnTint();
  const nf = 1 - tint[0] / 255;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.clearRect(0, 0, VW, VH);
  ctx.save();
  ctx.scale(scale, scale);
  ctx.translate(-camX, 0);

  // ---- background ----
  if (bgImg) {
    ctx.drawImage(bgImg, 0, 0, WORLD_W, WORLD_H);
  } else {
    const g = ctx.createLinearGradient(0, 0, 0, WORLD_H);
    g.addColorStop(0, '#12314a'); g.addColorStop(0.45, '#173a52'); g.addColorStop(1, '#0b2233');
    ctx.fillStyle = g; ctx.fillRect(0, 0, WORLD_W, WORLD_H);
    // terraces
    ctx.fillStyle = 'rgba(46,96,86,0.55)';
    [[240, 240, 760], [180, 340, 1180], [130, 450, 1400], [90, 580, 1700]].forEach(([, y, w]) => {
      ctx.beginPath(); ctx.ellipse(w / 2 + 100, y + 260, w / 2 + 140, 200, 0, 0, Math.PI * 2); ctx.fill();
    });
    // cove water (bottom-right — Nessie's home)
    const wg = ctx.createRadialGradient(1480, 740, 30, 1480, 740, 260);
    wg.addColorStop(0, '#2a7d9c'); wg.addColorStop(1, '#123c55');
    ctx.fillStyle = wg;
    ctx.beginPath(); ctx.ellipse(1480, 750, 250, 120, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(140,220,240,0.35)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.ellipse(1480, 750, 250, 120, 0, 0, Math.PI * 2); ctx.stroke();
    // water shimmer
    ctx.strokeStyle = 'rgba(160,230,250,0.2)';
    for (let i = 0; i < 3; i++) {
      const ph = t / 900 + i * 2.1;
      ctx.beginPath(); ctx.ellipse(1480, 750, 120 + i * 55 + Math.sin(ph) * 8, 55 + i * 26, 0, 0, Math.PI * 2); ctx.stroke();
    }
  }

  // ---- empty pads ----
  const pads = EXPANSIONS[S.expansion].pads;
  for (let i = 0; i < pads; i++) {
    const p = PAD_POS[i];
    const used = i < S.creatures.filter(c => !SPECIES[c.sp].water).length;
    if (!used) {
      const ds = dscale(p.y);
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.strokeStyle = 'rgba(127,216,200,0.3)';
      ctx.lineWidth = 2; ctx.setLineDash([7, 6]);
      ctx.beginPath(); ctx.ellipse(p.x, p.y + 18 * ds, 44 * ds, 18 * ds, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // ---- buildings (painter's order: farthest first) ----
  const blds = [
    ['den', PLOTS.den, '💕', S.breeds[0]],
    ['nursery', PLOTS.nursery, '🥚', null],
  ];
  if (S.den2) blds.push(['den', PLOTS.den2, '💕', S.breeds[1]]);
  for (let i = 0; i < farmCount(); i++) blds.push(['farm', PLOTS['farm' + i], '🌾', null]);
  if (S.vault) blds.push(['vault', PLOTS.vault, '🏦', null]);
  blds.sort((a, b) => a[1].y - b[1].y);
  for (const [k, pp, emo, ab] of blds) drawBuilding(k, pp, emo, t, ab);

  // farm timers
  for (let i = 0; i < farmCount(); i++) {
    const f = S.farms[i], p = PLOTS['farm' + i];
    if (f) drawTimer(p.x, p.y - 150 * dscale(p.y), f.readyAt, '🍖', now() >= f.readyAt);
  }
  // den timers
  for (let d = 0; d < denCount(); d++) {
    const b = S.breeds[d], p = d === 0 ? PLOTS.den : PLOTS.den2;
    if (b) drawTimer(p.x, p.y - 165 * dscale(p.y), b.readyAt, '💕', now() >= b.readyAt);
  }
  // egg flight from the den to the nursery (transition juice)
  if (eggFly) {
    const k = Math.min(1, (t - eggFly.t0) / eggFly.dur);
    const fx = eggFly.x0 + (eggFly.x1 - eggFly.x0) * k;
    const fy = eggFly.y0 + (eggFly.y1 - eggFly.y0) * k - Math.sin(Math.PI * k) * 160;
    ctx.save();
    ctx.translate(fx, fy);
    ctx.rotate(Math.sin(k * 9) * 0.25);
    if (spr.egg) ctx.drawImage(spr.egg, -20, -26, 40, 50);
    else { ctx.font = '36px serif'; ctx.textAlign = 'center'; ctx.fillText('🥚', 0, 12); }
    ctx.restore();
    if (rng() < 0.6) particles.push({ x: fx, y: fy + 10, vx: (rng() - 0.5) * 40, vy: (rng() - 0.5) * 30, life: 0.5, max: 0.5, col: '#ffe9b0', r: 2.2 });
    if (k >= 1) {
      eggFly = null;
      sfx.thump();
      puff(fx, fy + 14, 12, '#cfc39e');
    }
  }
  // nursery egg
  if (S.egg && !eggFly) {
    const p = PLOTS.nursery;
    const wob = Math.sin(t / 130) * (now() >= S.egg.readyAt ? 6 : 2);
    ctx.save();
    // the nursery hut is itself egg-shaped — park the incubating egg in front-right of it
    ctx.translate(p.x - 95 * dscale(p.y), p.y + 2 * dscale(p.y)); ctx.rotate(wob * 0.02);
    if (spr.egg) { ctx.drawImage(spr.egg, -26, -34, 52, 62); }
    else { ctx.font = '44px serif'; ctx.textAlign = 'center'; ctx.fillText('🥚', 0, 14); }
    if (S.egg.v !== 'normal') {
      ctx.font = '18px serif';
      ctx.globalAlpha = 0.6 + 0.4 * Math.sin(t / 160);
      ctx.fillText(VARIANTS[S.egg.v].icon, 20, -18);
    }
    ctx.restore();
    drawTimer(p.x - 95 * dscale(p.y), p.y - 65 * dscale(p.y), S.egg.readyAt, '🐣', now() >= S.egg.readyAt);
  }

  // ---- decorations ----
  let dIdx = 0;
  for (const d of DECOR) {
    for (let n = 0; n < (S.decor[d.id] || 0) && dIdx < DECOR_POS.length; n++) {
      const p = DECOR_POS[dIdx++];
      ctx.font = '30px serif'; ctx.textAlign = 'center';
      ctx.fillText(d.emo, p.x, p.y + Math.sin(t / 700 + dIdx) * 2);
    }
  }

  // ---- the Great Cove Tree (behind the building band) ----
  if (!SAFE_MODE) drawTree(t, treeStage());

  // ---- the shrine grove ----
  {
    const keys = ['E', 'M', 'N', 'B'];
    for (let i = 0; i < 4; i++) {
      const e = keys[i], sx = 95 + i * 36, sy = 480, ds = dscale(sy);
      const lvl = shrineLvl(e);
      ctx.save();
      ctx.translate(sx, sy);
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath(); ctx.ellipse(0, 8 * ds, 13 * ds, 5 * ds, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = lvl ? '#5a6f7d' : 'rgba(90,111,125,0.45)';
      ctx.strokeStyle = lvl ? 'rgba(127,216,200,0.65)' : 'rgba(127,216,200,0.2)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(-11 * ds, -26 * ds, 22 * ds, 34 * ds, 5); ctx.fill(); ctx.stroke();
      if (lvl) { ctx.shadowColor = '#7fd8c8'; ctx.shadowBlur = 7 + lvl * 4; }
      ctx.font = Math.round(15 * ds) + 'px serif'; ctx.textAlign = 'center';
      ctx.globalAlpha = lvl ? 1 : 0.55;
      ctx.fillText(EL_ICON[e], 0, -8 * ds);
      ctx.shadowBlur = 0; ctx.globalAlpha = 1;
      ctx.fillStyle = '#ffd166';
      for (let pp = 0; pp < lvl; pp++) { ctx.beginPath(); ctx.arc((-6 + pp * 6) * ds, 2 * ds, 1.8, 0, Math.PI * 2); ctx.fill(); }
      ctx.restore();
    }
    ctx.font = 'bold 11px sans-serif'; ctx.fillStyle = 'rgba(223,242,240,0.6)'; ctx.textAlign = 'center';
    ctx.fillText('Shrines', 149, 510);
  }

  // ---- the Wilds trailhead ----
  {
    const p = PLOTS.wilds, ds = dscale(p.y);
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.save(); ctx.translate(0, 14 * ds); groundShadow(52 * ds, 16 * ds); ctx.restore();
    // flanking pines mark the trail into the wilds
    ctx.font = Math.round(46 * ds) + 'px serif'; ctx.textAlign = 'center';
    ctx.fillText('🌲', -40 * ds, 6 * ds);
    ctx.font = Math.round(34 * ds) + 'px serif';
    ctx.fillText('🌲', 38 * ds, 2 * ds);
    // hand-drawn wooden signpost (emoji signs don't render everywhere)
    ctx.fillStyle = '#6b4a2f';
    ctx.fillRect(-3.5 * ds, -46 * ds, 7 * ds, 58 * ds);            // post
    ctx.fillStyle = '#8a6440';
    ctx.strokeStyle = '#4c3520'; ctx.lineWidth = 2;
    ctx.beginPath();                                                // arrow board
    ctx.moveTo(-34 * ds, -46 * ds); ctx.lineTo(22 * ds, -46 * ds); ctx.lineTo(34 * ds, -34 * ds);
    ctx.lineTo(22 * ds, -22 * ds); ctx.lineTo(-34 * ds, -22 * ds); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.font = 'bold ' + Math.round(11 * ds) + 'px sans-serif';
    ctx.fillStyle = '#2e1f10';
    ctx.fillText('WILDS →', -4 * ds, -30 * ds);
    ctx.font = 'bold 12px sans-serif'; ctx.fillStyle = 'rgba(223,242,240,0.85)';
    ctx.fillText('The Wilds', 0, 32 * ds);
    ctx.restore();
    if (S.expedition) drawTimer(p.x, p.y - 70 * ds, S.expedition.readyAt, '🎒', now() >= S.expedition.readyAt);
  }

  // ---- creatures (a creature on expedition is AWAY — not in the lair) ----
  const badges = [];
  let landIdx = 0;
  for (const c of S.creatures) {
    if (isAway(c.id)) continue;
    const d = SPECIES[c.sp];
    const p = d.water ? WATER_PAD : PAD_POS[landIdx++];
    if (!p) continue;
    c._px = p.x; c._py = p.y;
    const sway = Math.sin(t / 640 + c.id) * (d.water ? 0.04 : 0.018);
    // pet squash. CLAMPED to the 450ms window (stale _petT once produced petK in the
    // thousands -> the "giant flashing creatures" bug). Guard any weird delta forever.
    const dtp = c._petT ? t - c._petT : -1;
    const petK = (dtp >= 0 && dtp < 450) ? 1 - dtp / 450 : 0;
    // FEET-PLANTED idle (user: "they look like they're floating"): breathing squash at
    // the ground anchor + an occasional deliberate HOP. The shadow stays on the ground
    // and shrinks during hops — that contrast is what sells ground contact.
    const breath = Math.sin(t / 480 + c.id * 1.7);
    const hopPeriod = 4200 + ((c.id * 977) % 2800);
    const hopPh = ((t + c.id * 1337) % hopPeriod) / 1000;
    const hopK = (!d.water && hopPh < 0.38) ? Math.sin((hopPh / 0.38) * Math.PI) : 0;
    const size = (c.v === 'epic' ? 1.12 : 1) * (d.tier >= 2 ? 1.18 : 1) * (c.sp === 'dragon' ? 1.35 : 1)
      * dscale(p.y);   // perspective: lower on screen = closer = bigger
    const gy = 26 * size + hopK * 13;   // ground line in local coords (compensates the hop lift)

    ctx.save();
    ctx.translate(p.x, p.y + (d.water ? Math.sin(t / 500 + 2) * 6 : -hopK * 13));
    ctx.rotate(sway);

    // grounded contact shadow / water ring
    if (d.water) {
      ctx.fillStyle = 'rgba(180,240,255,0.18)';
      ctx.beginPath(); ctx.ellipse(0, gy, 34 * size, 11 * size, 0, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.save(); ctx.translate(0, gy); ctx.globalAlpha = 1 - hopK * 0.35;
      groundShadow((38 - hopK * 9) * size, (12 - hopK * 3) * size); ctx.restore();
    }
    // RARE/EPIC ground ring: pulsing, colored, unmissable (art-free variant identity)
    if (c.v !== 'normal' && !SAFE_MODE) {
      const epic = c.v === 'epic';
      const pulse = 0.5 + 0.5 * Math.sin(t / 280 + c.id * 2.1);
      ctx.save();
      ctx.strokeStyle = epic ? 'rgba(255,182,77,' + (0.5 + 0.4 * pulse) + ')' : 'rgba(143,216,255,' + (0.45 + 0.4 * pulse) + ')';
      ctx.lineWidth = 3 + pulse * 1.5;
      ctx.shadowColor = epic ? '#ffb64d' : '#8fd8ff';
      ctx.shadowBlur = 12 + 8 * pulse;
      ctx.beginPath(); ctx.ellipse(0, gy, (42 + 5 * pulse) * size, (14 + 2 * pulse) * size, 0, 0, Math.PI * 2); ctx.stroke();
      if (epic) {   // inner second ring — epics are royalty
        ctx.strokeStyle = 'rgba(255,226,150,' + (0.35 + 0.3 * (1 - pulse)) + ')';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.ellipse(0, gy, 30 * size, 10 * size, 0, 0, Math.PI * 2); ctx.stroke();
      }
      ctx.restore();
      if (rng() < 0.035) particles.push({   // rising sparkle motes
        x: p.x + (rng() - 0.5) * 60 * size, y: p.y + 15,
        vx: (rng() - 0.5) * 10, vy: -30 - rng() * 25, life: 1.1, max: 1.1,
        col: epic ? '#ffd166' : '#aee2ff', r: 1.8 + rng() * 1.6,
      });
    }

    // breathing squash anchored at the FEET (never lifts off the ground)
    ctx.translate(0, 26 * size);
    ctx.scale(1 - breath * 0.02 + petK * 0.14, 1 + breath * 0.028 - petK * 0.12);
    ctx.translate(0, -26 * size);

    // variant aura (night-element creatures glow after dark when no variant owns it)
    if (c.v === 'rare') { ctx.shadowColor = '#8fd8ff'; ctx.shadowBlur = 24; }
    else if (c.v === 'epic') { ctx.shadowColor = '#ffb64d'; ctx.shadowBlur = 36; }
    else if (nf > 0.2 && d.el.includes('N')) { ctx.shadowColor = '#93aaff'; ctx.shadowBlur = 22 * nf; }

    if (spr[c.sp]) {
      const im = spr[c.sp];
      const h = 88 * size, w = h * (im.width / im.height);
      if (c.v === 'rare') ctx.filter = 'hue-rotate(160deg) saturate(1.25)';
      if (c.v === 'epic') ctx.filter = 'hue-rotate(-40deg) saturate(1.6) brightness(1.1)';
      ctx.drawImage(im, -w / 2, -h + 26 * size, w, h);
      ctx.filter = 'none';
    } else {
      ctx.font = Math.round(52 * size) + 'px serif';
      ctx.textAlign = 'center';
      ctx.fillText(d.emo, 0, 16);
    }
    ctx.shadowBlur = 0;

    // sparkles for variants
    if (c.v !== 'normal') {
      const n = c.v === 'epic' ? 3 : 2;
      ctx.font = '13px serif';
      for (let i = 0; i < n; i++) {
        const ph = t / 500 + i * 2.2 + c.id;
        ctx.globalAlpha = 0.5 + 0.5 * Math.sin(ph * 2);
        ctx.fillText(c.v === 'epic' ? '🌟' : '✨', Math.sin(ph) * 34, -46 - ((ph * 14) % 30));
      }
      ctx.globalAlpha = 1;
    }
    // level star
    if (c.lvl >= LEVEL_MAX) { ctx.font = '16px serif'; ctx.fillText('⭐', 26, -46); }
    ctx.restore();

    if (!d.water && hopPh >= 0.38 && hopPh < 0.43 && rng() < 0.12) {
      particles.push({ x: p.x + (rng() - 0.5) * 26 * size, y: p.y + 24 * size,
        vx: (rng() - 0.5) * 30, vy: -8 - rng() * 12, life: 0.4, max: 0.4, col: 'rgba(160,170,130,0.8)', r: 2 });
    }
    // gold-ready badge: queued for a final overlay pass so neighbors/buildings never cover it
    const pend = pendingOf(c);
    if (pend >= 1) badges.push({ c, p, d, size, pend });

  }

  // ---- day/night tint over the world (badges/timers drawn after stay bright) ----
  if (!SAFE_MODE && (tint[0] !== 255 || tint[1] !== 255 || tint[2] !== 255)) {
    ctx.save();
    ctx.globalCompositeOperation = 'multiply';
    ctx.fillStyle = 'rgb(' + tint[0] + ',' + tint[1] + ',' + tint[2] + ')';
    ctx.fillRect(camX - 4, -4, WORLD_W + 8, WORLD_H + 8);
    ctx.restore();
  }
  // fireflies drift through the cove after dark
  if (nf > 0.3 && !SAFE_MODE) {
    ctx.save();
    for (let i = 0; i < 14; i++) {
      const ph = t / 1000 + i * 7.31;
      const fx = ((i * 131.7) % WORLD_W) + Math.sin(ph * 0.6 + i) * 70;
      const fy = 340 + ((i * 97) % 420) + Math.sin(ph * 0.9) * 34;
      const a = (0.35 + 0.65 * Math.abs(Math.sin(ph * 1.6 + i))) * Math.min(1, (nf - 0.3) / 0.3);
      ctx.globalAlpha = a * 0.9;
      ctx.fillStyle = '#d8ffa0'; ctx.shadowColor = '#d8ffa0'; ctx.shadowBlur = 9;
      ctx.beginPath(); ctx.arc(fx, fy, 2.3, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }

  // ---- coin badges (always on top — user asked for unmissable) ----
  for (const bg2 of badges) {
    const { c, p, d, size, pend } = bg2;
    const full = pend >= capOf(c) - 0.5;
    const bs = Math.max(0.85, size);
    const bounce = Math.abs(Math.sin(t / 260 + c.id)) * (full ? 8 : 4);
    ctx.save();
    ctx.translate(p.x, p.y - (96 + (d.tier >= 2 ? 16 : 0)) * size - bounce);
    const txt = '+' + fmt(pend);
    ctx.font = 'bold ' + Math.round(13 * bs) + 'px sans-serif';
    const tw = ctx.measureText(txt).width;
    const w = tw + 34 * bs, h = 24 * bs;
    ctx.fillStyle = full ? 'rgba(90,60,5,0.97)' : 'rgba(40,32,8,0.92)';
    ctx.strokeStyle = full ? '#ffd166' : 'rgba(255,209,102,0.65)';
    ctx.lineWidth = full ? 2.5 : 1.5;
    if (full) { ctx.shadowColor = '#ffd166'; ctx.shadowBlur = 12 + 6 * Math.sin(t / 180); }
    ctx.beginPath(); ctx.roundRect(-w / 2, -h / 2, w, h, h / 2); ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.font = Math.round(15 * bs) + 'px serif';
    ctx.fillText('🪙', -w / 2 + 5 * bs, 1);
    ctx.font = 'bold ' + Math.round(13 * bs) + 'px sans-serif';
    ctx.fillStyle = '#ffd166';
    ctx.fillText(txt, -w / 2 + 24 * bs, 1);
    if (full) {
      ctx.textAlign = 'center';
      ctx.font = 'bold ' + Math.round(10 * bs) + 'px sans-serif';
      ctx.fillStyle = '#ffe9b0';
      ctx.fillText('FULL — TAP ME!', 0, h / 2 + 9 * bs);
    }
    ctx.restore();
  }

  // ---- roaming bonus critter (coin chase / butterfly) ----
  if (roamer) {
    const age = now() - roamer.born;
    if (age > roamer.ttl) { roamer = null; }
    else {
      const k = age / roamer.ttl;
      const spd = 1 + k * 1.6;                       // it gets nervous near escape
      roamer.x += Math.sin(t / 400 + roamer.seed) * 1.6 * spd + 0.55 * spd;
      if (roamer.kind === 'coin') {
        roamer._dy = -Math.abs(Math.sin(t / 190 + roamer.seed)) * 34;   // hopping
      } else {
        roamer._dy = Math.sin(t / 300 + roamer.seed) * 26 - 46;         // fluttering
      }
      if (roamer.x > WORLD_W - 40) roamer.x = 40;
      const rx = roamer.x, ry = roamer.y + (roamer._dy || 0);
      ctx.save();
      ctx.globalAlpha = k > 0.82 ? 1 - (k - 0.82) / 0.18 : 1;
      ctx.translate(rx, ry);
      if (roamer.kind === 'coin') {
        const sq = 0.75 + 0.25 * Math.abs(Math.sin(t / 190 + roamer.seed));
        ctx.scale(sq, 1);
        ctx.shadowColor = '#ffd166'; ctx.shadowBlur = 18;
        ctx.fillStyle = '#ffd166';
        ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#b8860b';
        ctx.font = 'bold 17px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('$', 0, 1);
      } else {
        const flap = Math.sin(t / 90) * 0.6;
        ctx.shadowColor = '#ff9ec2'; ctx.shadowBlur = 12;
        ctx.fillStyle = '#ff9ec2';
        ctx.save(); ctx.rotate(-0.4 + flap * 0.35);
        ctx.beginPath(); ctx.ellipse(-9, -4, 11, 7, -0.5, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        ctx.save(); ctx.rotate(0.4 - flap * 0.35);
        ctx.fillStyle = '#c792ea';
        ctx.beginPath(); ctx.ellipse(9, -4, 11, 7, 0.5, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        ctx.fillStyle = '#3a2b3f';
        ctx.beginPath(); ctx.ellipse(0, 0, 2.6, 8, 0, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
      // shadow on the ground
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.beginPath(); ctx.ellipse(rx, roamer.y + 12, 12, 4, 0, 0, Math.PI * 2); ctx.fill();
    }
  }

  // ---- particles ----
  for (const pt of particles) {
    ctx.globalAlpha = Math.max(0, pt.life / pt.max);
    if (pt.txt) { ctx.font = 'bold 15px sans-serif'; ctx.fillStyle = pt.col; ctx.textAlign = 'center'; ctx.fillText(pt.txt, pt.x, pt.y); }
    else { ctx.fillStyle = pt.col; ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2); ctx.fill(); }
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function groundShadow(w, h) {
  // soft radial contact shadow — the difference between "sitting on" and "hovering over"
  const g = ctx.createRadialGradient(0, 0, 2, 0, 0, w);
  g.addColorStop(0, 'rgba(10,20,10,0.42)');
  g.addColorStop(0.7, 'rgba(10,20,10,0.2)');
  g.addColorStop(1, 'rgba(10,20,10,0)');
  ctx.save();
  ctx.scale(1, h / w);
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0, 0, w, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}
const TREE_POS = { x: 762, y: 300 };
function drawTree(t, stage) {
  const p = TREE_POS, ds = dscale(p.y);
  const mythic = stage >= 7;
  const sway = Math.sin(t / 1700) * 0.014 * (1 + stage * 0.1);
  const im = spr['tree_' + stage];
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.save(); ctx.translate(0, 10 * ds); groundShadow((22 + stage * 10) * ds, (8 + stage * 2.5) * ds); ctx.restore();
  ctx.rotate(sway);
  if (im) {
    // Meshy stage art (2026-07-03): grass base baked in — bottom edge is the ground line
    const h = (52 + stage * 38) * ds, w = h * (im.width / im.height);
    if (mythic) { ctx.shadowColor = '#9ff3d0'; ctx.shadowBlur = 26; }
    ctx.drawImage(im, -w / 2, -h + 14 * ds, w, h);
    ctx.shadowBlur = 0;
  } else {
    // procedural fallback (art still loading / failed)
    const h = (30 + stage * 36) * ds;
    const tw = (3.5 + stage * 2.4) * ds;
    ctx.fillStyle = mythic ? '#7a5f8f' : '#6b4a2f';
    ctx.beginPath();
    ctx.moveTo(-tw, 10 * ds);
    ctx.quadraticCurveTo(-tw * 0.5, -h * 0.5, -tw * 0.35, -h * 0.7);
    ctx.lineTo(tw * 0.35, -h * 0.7);
    ctx.quadraticCurveTo(tw * 0.5, -h * 0.5, tw, 10 * ds);
    ctx.closePath(); ctx.fill();
    if (mythic) { ctx.shadowColor = '#9ff3d0'; ctx.shadowBlur = 34; }
    const palette = mythic ? ['#3f9f7a', '#54b98d', '#7fd8a8'] : ['#3f7d3a', '#529a48', '#6ab85c'];
    const blobs = 2 + stage * 2;
    for (let i = 0; i < blobs; i++) {
      const ang = (i / blobs) * Math.PI * 2 + i * 1.71;
      const rad = h * (0.2 + 0.11 * ((i * 37) % 3));
      const bx = Math.cos(ang) * h * 0.24;
      const by = -h * 0.7 - Math.sin(ang * 1.3) * h * 0.16 - rad * 0.25;
      ctx.fillStyle = palette[i % 3];
      ctx.beginPath(); ctx.arc(bx, by, rad, 0, Math.PI * 2); ctx.fill();
    }
    ctx.shadowBlur = 0;
    if (stage >= 4) {
      for (let i = 0; i < stage + 1; i++) {
        const fx = Math.sin(i * 2.7) * h * 0.3, fy = -h * (0.5 + 0.28 * (((i * 53) % 10) / 10));
        const tw2 = 0.5 + 0.5 * Math.sin(t / 420 + i * 2.1);
        ctx.fillStyle = 'rgba(255,209,102,' + (0.55 + 0.45 * tw2) + ')';
        ctx.shadowColor = '#ffd166'; ctx.shadowBlur = 9 * tw2;
        ctx.beginPath(); ctx.arc(fx, fy, 3.6 * ds, 0, Math.PI * 2); ctx.fill();
      }
      ctx.shadowBlur = 0;
    }
  }
  ctx.restore();
  if (mythic && rng() < 0.05) particles.push({
    x: p.x + (rng() - 0.5) * 130 * ds, y: p.y - 190 * ds,
    vx: (rng() - 0.5) * 8, vy: -12 - rng() * 10, life: 1.6, max: 1.6, col: '#b8ffd9', r: 2,
  });
  ctx.font = 'bold 12px sans-serif'; ctx.fillStyle = 'rgba(223,242,240,0.7)'; ctx.textAlign = 'center';
  ctx.fillText('Cove Tree', p.x, p.y + 26 * ds);
}
function drawBuilding(kind, p, emo, t, activeBreed) {
  if (!p) return;
  const ds = dscale(p.y);
  // Buildings sit DIRECTLY on the meadow: their art has grass bases painted in (they
  // were generated for exactly this), so grounding = one soft AO contact shadow. The
  // dirt-platform experiment made things WORSE (flat tan pancakes under painterly art).
  const sink = (kind === 'farm' ? 18 : kind === 'vault' ? 20 : 14) * ds;
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.save(); ctx.translate(0, 12 * ds); groundShadow(92 * ds, 26 * ds); ctx.restore();
  if (spr[kind]) {
    const im = spr[kind], h = 165 * ds, w = h * (im.width / im.height);
    ctx.drawImage(im, -w / 2, -h + sink, w, h);
  } else {
    ctx.fillStyle = 'rgba(30,60,80,0.9)'; ctx.strokeStyle = 'rgba(127,216,200,0.5)'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.roundRect(-52 * ds, -72 * ds, 104 * ds, 92 * ds, 12); ctx.fill(); ctx.stroke();
    ctx.font = Math.round(40 * ds) + 'px serif'; ctx.textAlign = 'center'; ctx.fillText(emo, 0, -10 * ds);
  }
  if (activeBreed) {
    const ds2 = dscale(p.y);
    ctx.font = Math.round(16 * ds2) + 'px serif'; ctx.globalAlpha = 0.6 + 0.4 * Math.sin(t / 250);
    ctx.fillText('💗', -22 * ds2 + Math.sin(t / 300) * 6, -110 * ds2);
    ctx.fillText('💗', 22 * ds2 - Math.sin(t / 300) * 6, -110 * ds2);
    ctx.globalAlpha = 1;
  }
  if (p.label) {
    ctx.font = 'bold 12px sans-serif'; ctx.fillStyle = 'rgba(223,242,240,0.8)'; ctx.textAlign = 'center';
    ctx.fillText(p.label, 0, 42 * dscale(p.y));
  }
  ctx.restore();
}
function drawTimer(x, y, readyAt, icon, ready) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = ready ? 'rgba(60,90,40,0.95)' : 'rgba(8,22,34,0.92)';
  ctx.strokeStyle = ready ? '#9be36e' : 'rgba(127,216,200,0.5)';
  ctx.lineWidth = 1.5;
  const txt = ready ? 'READY!' : fmtT(readyAt - now());
  ctx.font = 'bold 13px sans-serif';
  const w = ctx.measureText(txt).width + 38;
  ctx.beginPath(); ctx.roundRect(-w / 2, -14, w, 28, 14); ctx.fill(); ctx.stroke();
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.font = '14px serif'; ctx.fillText(icon, -w / 2 + 7, 1);
  ctx.font = 'bold 13px sans-serif';
  ctx.fillStyle = ready ? '#c9f59e' : '#dff2f0';
  ctx.fillText(txt, -w / 2 + 27, 1);
  ctx.restore();
}

// ---------- BREED modal ----------

}

      const ready = now() >= b.readyAt;
      info.innerHTML = '<div class="cardName">Den ' + (d + 1) + ': breeding… ' + (ready ? '💖 DONE!' : '') + '</div>' +
        '<div class="cardSub">' + (ready ? 'The egg is ready to move to the Nursery' : 'Time left: ' + fmtT(b.readyAt - now())) + '</div>';
      row.appendChild(info);
      if (ready && !S.egg) {
        const btn = document.createElement('button'); btn.className = 'cardBtn green'; btn.textContent = 'TO NURSERY';
        btn.onclick = () => {
          claimBreed(d);
          const from = d === 0 ? PLOTS.den : PLOTS.den2;
          const nds = dscale(PLOTS.nursery.y);
          eggFly = { t0: performance.now(), dur: 1100, x0: from.x, y0: from.y - 60 * dscale(from.y),
                     x1: PLOTS.nursery.x + 100 * nds, y1: PLOTS.nursery.y - 20 * nds };
          sfx.whoosh();

        };

        row.appendChild(btn);

    info.innerHTML = '<div class="cardName">🥚 Nursery' + (ready ? ': ready to HATCH!' : '') + '</div>' +
      '<div class="cardSub">' + (ready ? 'Tap hatch — what’s inside?' + shim : 'Incubating: ' + fmtT(S.egg.readyAt - now()) + shim) + '</div>';
    row.appendChild(info);

      const btn = document.createElement('button'); btn.className = 'cardBtn gold'; btn.textContent = 'HATCH!';
      btn.onclick = () => { closeModal(); doHatch(); };

    }
    body.appendChild(row);

  const freeDen = S.breeds.findIndex((b, i) => !b && i < denCount()) >= 0;

  // picker slots
  const slotRow = document.createElement('div'); slotRow.className = 'slotRow';
  const mk = (c) => {
    const s = document.createElement('div'); s.className = 'bSlot';

      if (spr[c.sp]) { const im = document.createElement('img'); im.src = 'sprites/' + c.sp + '.png'; im.style.maxWidth = '84%'; im.style.maxHeight = '84%'; s.appendChild(im); }
      else s.textContent = SPECIES[c.sp].emo;
      const l = document.createElement('div'); l.className = 'lvl'; l.textContent = (VARIANTS[c.v].icon || '') + 'L' + c.lvl; s.appendChild(l);

  slotRow.appendChild(mk(pickA));
  const heart = document.createElement('div'); heart.className = 'heartMid'; heart.textContent = '💕'; slotRow.appendChild(heart);
  slotRow.appendChild(mk(pickB));
  body.appendChild(slotRow);

  const union = document.createElement('div'); union.className = 'unionTag';
  union.textContent = (pickA && pickB) ? 'Elements combined: ' + elIcons(elUnion(pickA.sp, pickB.sp)) : 'Pick two creatures below';
  body.appendChild(union);

  const go = document.createElement('button'); go.className = 'goBtn' + ((pickA && pickB) ? '' : ' cant'); go.textContent = 'START BREEDING';
  go.onclick = () => {
    if (!pickA || !pickB) return;
    const b = startBreed(pickA.id, pickB.id);
    if (b) { sfx.breed(); save(); toast('💕 Breeding started!'); renderBreed(body); refreshTop(); }
    else sfx.err();
  };
  body.appendChild(go);

  // roster
  const busy = busyIds();
  for (const c of S.creatures) {
    const row = document.createElement('div');
    row.className = 'card' + ((pickA === c || pickB === c) ? ' sel' : '');
    row.appendChild(artCell(c.sp, c.v));
    const info = document.createElement('div'); info.className = 'cardInfo';
    info.innerHTML = '<div class="cardName">' + vName(c) + ' <span style="color:#9fb8c8;font-weight:600">L' + c.lvl + '</span></div>' +
      '<div class="cardSub">' + elIcons(SPECIES[c.sp].el) + (isAway(c.id) ? ' — 🎒 off exploring' : busy.has(c.id) ? ' — busy breeding' : '') + '</div>';
    row.appendChild(info);
    if (!busy.has(c.id)) {

      btn.textContent = (pickA === c || pickB === c) ? 'REMOVE' : 'PICK';

        else if (!pickB) pickB = c;

      };

    }
    body.appendChild(row);
  }
}

// ---------- HATCH flow ----------
function doHatch() {
  if (!S.egg || now() < S.egg.readyAt) return;
  if (!SPECIES[S.egg.sp].water && S.creatures.filter(c => !SPECIES[c.sp].water).length >= EXPANSIONS[S.expansion].pads) {
    toast('🏠 No free pads! Buy a Cove Expansion in the Shop.');
    sfx.err();
    return;
  }
  const eggData = S.egg;
  const wrap = $('hatchWrap');
  wrap.style.display = 'flex';
  const eggEl = $('hatchEgg'), rays = $('hatchRays'), flash = $('hatchFlash');
  rays.style.opacity = '0';
  flash.style.opacity = '0';
  eggEl.classList.remove('popIn');
  eggEl.style.display = 'block';
  eggEl.innerHTML = spr.egg ? '<img src="sprites/egg.png">' : '🥚';
  eggEl.style.transform = 'none';
  if (eggData.v === 'rare') eggEl.style.filter = 'drop-shadow(0 0 24px #8fd8ff)';
  else if (eggData.v === 'epic') eggEl.style.filter = 'drop-shadow(0 0 34px #ffb64d)';
  else eggEl.style.filter = '';
  $('hatchName').textContent = eggData.v !== 'normal' ? 'The egg is SHIMMERING…' : 'Tap the egg to crack it!';
  $('hatchSub').textContent = 'tap tap tap!';
  $('hatchBtn').style.display = 'none';

  const chipColors = ['#efe6d0', '#e0d4b8', '#f5eedd', '#cfc39e'];
  function shellChips(n, spread) {
    const rect = eggEl.getBoundingClientRect();
    const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
    for (let i = 0; i < n; i++) {
      const ch = document.createElement('div');
      ch.className = 'chip';
      ch.style.background = chipColors[i % chipColors.length];
      ch.style.left = cx + 'px'; ch.style.top = cy + 'px';
      document.body.appendChild(ch);
      const a = Math.random() * Math.PI * 2, dist = spread + Math.random() * spread;
      requestAnimationFrame(() => {
        ch.style.transform = 'translate(' + (Math.cos(a) * dist) + 'px,' + (Math.sin(a) * dist + 70) + 'px) rotate(' + ((Math.random() - 0.5) * 540) + 'deg)';
        ch.style.opacity = '0';
      });
      setTimeout(() => ch.remove(), 1000);
    }
  }

  let taps = 0;
  eggEl.onclick = () => {
    taps++;
    if (taps < 3) {
      sfx.knock(taps);
      shellChips(3 + taps * 2, 40 + taps * 25);
      // escalating shake
      const mag = 5 + taps * 5;
      let i = 0;
      const shake = setInterval(() => {
        i++;
        eggEl.style.transform = 'translate(' + ((Math.random() - 0.5) * mag) + 'px,' + ((Math.random() - 0.5) * mag * 0.6) + 'px) rotate(' + ((Math.random() - 0.5) * (6 + taps * 5)) + 'deg) scale(' + (1 + taps * 0.06) + ')';
        if (i > 6) { clearInterval(shake); eggEl.style.transform = 'scale(' + (1 + taps * 0.06) + ')'; }
      }, 30);
      $('hatchSub').textContent = taps === 1 ? 'it wobbled!' : 'something\u2019s moving in there!';
      return;
    }
    if (taps > 3) return;
    // THE CRACK
    eggEl.onclick = null;
    sfx.crackBig();
    shellChips(18, 150);
    flash.style.opacity = '1';
    setTimeout(() => {
      const res = hatchEgg();
      if (!res) { wrap.style.display = 'none'; flash.style.opacity = '0'; return; }
      const c = res.c;
      flash.style.opacity = '0';
      eggEl.innerHTML = spr[c.sp] ? '<img src="sprites/' + c.sp + '.png">' : '<span style="font-size:110px">' + SPECIES[c.sp].emo + '</span>';
      eggEl.classList.add('popIn');
      eggEl.style.transform = 'none';
      if (c.v === 'rare') eggEl.style.filter = 'drop-shadow(0 0 28px #8fd8ff)';
      else if (c.v === 'epic') eggEl.style.filter = 'drop-shadow(0 0 40px #ffb64d)';
      else eggEl.style.filter = 'drop-shadow(0 6px 20px rgba(0,0,0,0.6))';
      if (res.isNew || c.v !== 'normal') {
        rays.style.opacity = '1';
        if (c.v === 'rare') rays.style.filter = 'hue-rotate(160deg)';
        else if (c.v === 'epic') rays.style.filter = 'saturate(1.6)';
        else rays.style.filter = '';
      }
      const nm = $('hatchName');
      nm.textContent = (res.isNew ? '🎉 NEW! ' : '') + vName(c);
      nm.classList.remove('popIn'); void nm.offsetWidth; nm.classList.add('popIn');
      $('hatchSub').textContent = res.isNew ? 'Added to your Bestiary!' : 'Another one for the cove.';
      if (c.v === 'epic') sfx.epicSting();
      else if (res.isNew) sfx.disc();
      else if (c.v === 'rare') sfx.rare();
      else sfx.hatch();
      $('hatchBtn').style.display = 'block';
      $('hatchBtn').onclick = () => { wrap.style.display = 'none'; rays.style.opacity = '0'; save(); refreshTop(); maybeSubmitScore(); };
      save(); refreshTop();
    }, 380);
  };
}

// ---------- SHOP modal ----------
let shopTab = 'creatures';
function openShop(tab) {
  shopTab = tab || 'creatures';
  openModal('SHOP', renderShop);
}
function renderShop(body) {
  body.innerHTML = '';
  const tabs = document.createElement('div'); tabs.className = 'tabRow';
  for (const [id, label] of [['creatures', '🐾 Creatures'], ['buildings', '🏗 Buildings'], ['shrines', '⛩ Shrines'], ['decor', '🎪 Decor'], ['expand', '🏠 Expand']]) {
    const t = document.createElement('button'); t.className = 'tab' + (shopTab === id ? ' on' : ''); t.textContent = label;
    t.onclick = () => { shopTab = id; renderShop(body); };
    tabs.appendChild(t);
  }
  body.appendChild(tabs);

  const mkRow = (art, name, sub, btnText, cls, fn) => {
    const row = document.createElement('div'); row.className = 'card';
    if (art) row.appendChild(art);
    const info = document.createElement('div'); info.className = 'cardInfo';
    info.innerHTML = '<div class="cardName">' + name + '</div><div class="cardSub">' + sub + '</div>';
    row.appendChild(info);
    const btn = document.createElement('button'); btn.className = 'cardBtn ' + cls; btn.textContent = btnText;
    if (fn) btn.onclick = fn;
    row.appendChild(btn);
    body.appendChild(row);
  };

  if (shopTab === 'creatures') {
    for (const sp of SP_KEYS) {
      const d = SPECIES[sp];
      const unlocked = d.tier === 0 || discoveredSpecies(sp);
      if (!unlocked) {
        mkRow(artCell(sp, 'normal'), '???', 'Discover by breeding ' + elIcons(d.el), 'LOCKED', 'cant', null);
        const last = body.lastChild;
        last.querySelector('.cardArt').style.filter = 'brightness(0) opacity(0.5)';
        continue;
      }
      const afford = S.gold >= d.cost, room = d.water || S.creatures.filter(c => !SPECIES[c.sp].water).length < EXPANSIONS[S.expansion].pads;
      mkRow(artCell(sp, 'normal'), d.name, elIcons(d.el) + ' · ' + d.gpm + ' 🪙/min',
        '🪙 ' + fmt(d.cost), afford && room ? 'gold' : 'cant',
        () => {
          const c = buyCreature(sp);
          if (c) { sfx.buy(); toast('Welcome, ' + d.name + '!'); save(); refreshTop(); renderShop(body); }
          else { sfx.err(); if (!room) toast('🏠 No free pads!'); }
        });
    }
  } else if (shopTab === 'buildings') {
    if (farmCount() < FARM_COSTS.length) {
      const cost = FARM_COSTS[farmCount()];
      mkRow(null, '🌾 Farm ' + (farmCount() + 1), 'Turns gold into creature food', '🪙 ' + fmt(cost),
        S.gold >= cost ? 'gold' : 'cant',
        () => { if (buyFarm()) { sfx.buy(); save(); refreshTop(); renderShop(body); } else sfx.err(); });
    }
    if (!S.vault) mkRow(null, '🏦 Vault', '+50% gold storage for EVERY creature', '🪙 ' + fmt(VAULT_COST),
      S.gold >= VAULT_COST ? 'gold' : 'cant',
      () => { if (buyVault()) { sfx.buy(); save(); refreshTop(); renderShop(body); } else sfx.err(); });
    if (!S.den2) mkRow(null, '💕 Second Breeding Den', 'Run two breeds at once', '🪙 ' + fmt(DEN2_COST),
      S.gold >= DEN2_COST ? 'gold' : 'cant',
      () => { if (buyDen2()) { sfx.buy(); save(); refreshTop(); renderShop(body); } else sfx.err(); });
    // farms management
    for (let i = 0; i < farmCount(); i++) {
      const f = S.farms[i];
      if (!f) {
        for (const [bi, b] of FOOD_BATCHES.entries()) {
          mkRow(null, '🌾 Farm ' + (i + 1) + ': cook batch', b.food + ' 🍖 in ' + b.min + ' min', '🪙 ' + b.gold,
            S.gold >= b.gold ? 'green' : 'cant',
            () => { if (startBatch(i, bi)) { sfx.buy(); save(); refreshTop(); renderShop(body); } else sfx.err(); });
        }
      } else if (now() >= f.readyAt) {
        mkRow(null, '🌾 Farm ' + (i + 1), 'Food is ready!', '🍖 COLLECT ' + f.food, 'green',
          () => { claimBatch(i); sfx.feed(); save(); refreshTop(); renderShop(body); });
      } else {
        mkRow(null, '🌾 Farm ' + (i + 1), 'Cooking… ' + fmtT(f.readyAt - now()), '⏳', 'cant', null);
      }
    }
  } else if (shopTab === 'shrines') {
    const note = document.createElement('div'); note.className = 'unionTag';
    note.textContent = 'Each level: +5% gold for every creature with that element';
    body.appendChild(note);
    shrineRows(body, () => renderShop(body));
  } else if (shopTab === 'decor') {
    for (const d of DECOR) {
      mkRow(null, d.emo + ' ' + d.name, 'Owned: ' + (S.decor[d.id] || 0), '🪙 ' + fmt(d.cost),
        S.gold >= d.cost ? 'gold' : 'cant',
        () => { if (buyDecor(d.id)) { sfx.buy(); save(); refreshTop(); renderShop(body); } else sfx.err(); });
    }
  } else if (shopTab === 'expand') {
    const nxt = EXPANSIONS[S.expansion + 1];
    if (nxt) {
      mkRow(null, '🏠 Cove Expansion', EXPANSIONS[S.expansion].pads + ' → ' + nxt.pads + ' creature pads', '🪙 ' + fmt(nxt.cost),
        S.gold >= nxt.cost ? 'gold' : 'cant',
        () => { if (buyExpansion()) { sfx.buy(); toast('🏠 The cove grows!'); save(); refreshTop(); renderShop(body); } else sfx.err(); });
    } else {
      mkRow(null, '🏠 Cove Expansion', 'Your cove is at max size — 20 pads!', 'MAX', 'cant', null);
    }
  }
}

    p.appendChild(fb);
  } else {
    const mx = document.createElement('div'); mx.className = 'sub'; mx.textContent = '⭐ MAX LEVEL';
    p.appendChild(mx);
  }
  const canSell = S.creatures.length > 1 && !busyIds().has(c.id);
  if (canSell) {
    const sb = document.createElement('button'); sb.className = 'selBtn';
    sb.style.borderColor = 'rgba(255,110,110,0.55)'; sb.style.background = 'rgba(255,110,110,0.1)'; sb.style.color = '#ff9a9a';
    sb.textContent = '💰 Sell (' + fmt(sellValue(c)) + ')';
    let armed = false, disarm = null;
    sb.onclick = () => {
      if (!armed) {   // two-tap confirm — kid-proofing an irreversible action
        armed = true;
        sb.textContent = '⚠ Really sell? Tap again';
        disarm = setTimeout(() => { armed = false; sb.textContent = '💰 Sell (' + fmt(sellValue(c)) + ')'; }, 3000);
        return;
      }
      clearTimeout(disarm);
      const res = sellCreature(c.id);
      if (res) {
        sfx.coin();
        if (c._px !== undefined) puff(c._px, c._py - 40, 10, '#ffd166', '+' + fmt(res.value) + ' 🪙');
        toast(vName(c) + ' released for ' + fmt(res.value) + ' 🪙 (still in your Bestiary)');
        hideSel(); save(); refreshTop();
      } else sfx.err();
    };
    p.appendChild(sb);
  }
  const x = document.createElement('button'); x.className = 'closeX'; x.textContent = '✕';
  x.onclick = hideSel;
  p.appendChild(x);
  p.style.display = 'flex';
}
function hideSel() { selected = null; $('selPanel').style.display = 'none'; }

// ============================== INPUT ==============================
let dragX = null, dragged = false;
cv.addEventListener('pointerdown', (e) => { dragX = e.clientX; dragged = false; });
cv.addEventListener('pointermove', (e) => {
  if (dragX === null) return;
  const dx = e.clientX - dragX;
  if (Math.abs(dx) > 6) dragged = true;
  camX = Math.max(0, Math.min(camX - dx / scale, WORLD_W - VW / scale));
  dragX = e.clientX;
});
window.addEventListener('pointerup', (e) => {
  const wasDrag = dragged;
  dragX = null; dragged = false;
  if (wasDrag || e.target !== cv) return;
  handleTap((e.clientX) / scale + camX, (e.clientY) / scale);
});
function handleTap(wx, wy) {
  if (ac() && AC.state === 'suspended') AC.resume();
  // the runaway critter takes priority — it's escaping!
  if (roamer) {
    const ry = roamer.y + (roamer._dy || 0);
    if (Math.abs(wx - roamer.x) < 48 && Math.abs(wy - ry) < 48) {
      const got = catchRoamer();
      if (got) {
        if (got.kind === 'coin') { sfx.coin(); sfx.buy(); puff(wx, wy, 14, '#ffd166', '+' + fmt(got.gold) + ' 🪙'); }
        else { sfx.feed(); puff(wx, wy, 12, '#ff9ec2', '+' + got.food + ' 🍖'); }
        save(); refreshTop();
      }
      return;
    }
  }
  // creatures first (topmost)
  let landIdx = 0;
  let hit = null;
  for (const c of S.creatures) {
    if (isAway(c.id)) continue;
    const d = SPECIES[c.sp];
    const p = d.water ? WATER_PAD : PAD_POS[landIdx++];
    if (!p) continue;
    const ds = dscale(p.y);
    if (Math.abs(wx - p.x) < 55 * ds && wy > p.y - 110 * ds && wy < p.y + 40 * ds) hit = c;
  }
  if (hit) {
    const got = collect(hit);
    if (got > 0) {
      sfx.coin();
      puff(hit._px, hit._py - 50, 10, '#ffd166', '+' + fmt(got) + ' 🪙');
      save(); refreshTop(); maybeSubmitScore();
    } else {
      // nothing to collect -> a PET: bounce, hearts, its own little chirp, tiny treat
      hit._petT = performance.now();
      let hsh = 0; for (const ch of hit.sp) hsh = (hsh * 31 + ch.charCodeAt(0)) % 997;
      tone(280 + (hsh % 11) * 55, 0.09, 'triangle', 0.09);
      tone(280 + (hsh % 11) * 55 * 1.5, 0.12, 'triangle', 0.07, 0.07);
      const treat = petCreature(hit);
      puff(hit._px, hit._py - 55, 6, '#ff9ec2', treat ? '💕 +' + treat.gold : '💕');
      if (treat) { save(); refreshTop(); }
    }
    showSel(hit);
    return;
  }
  hideSel();
  // the incubating egg itself (it sits beside the nursery; kids tap the THING, not the hut)
  if (S.egg) {
    const np = PLOTS.nursery, nds = dscale(np.y);
    const ex = np.x - 95 * nds, ey = np.y - 20 * nds;
    if (Math.abs(wx - ex) < 55 * nds && Math.abs(wy - ey) < 70 * nds) {
      if (now() >= S.egg.readyAt) doHatch(); else openBreed();
      return;
    }
  }
  // buildings
  const near = (p, r) => p && Math.abs(wx - p.x) < r * dscale(p.y) && Math.abs(wy - (p.y - 60 * dscale(p.y))) < (r + 45) * dscale(p.y);
  {
    const st = treeStage();
    const r = 45 + st * 14;
    if (Math.abs(wx - TREE_POS.x) < r && wy > TREE_POS.y - (40 + st * 38) && wy < TREE_POS.y + 30) { openTree(); return; }
  }
  if (wx > 65 && wx < 230 && wy > 435 && wy < 505) { sfx.tap(); openShrines(); return; }
  if (near(PLOTS.wilds, 60)) { openWilds(); return; }
  if (near(PLOTS.den, 75) || (S.den2 && near(PLOTS.den2, 75))) { openBreed(); return; }
  if (near(PLOTS.nursery, 75)) {
    if (S.egg && now() >= S.egg.readyAt) doHatch();
    else openBreed();
    return;
  }
  for (let i = 0; i < farmCount(); i++) {
    if (near(PLOTS['farm' + i], 60)) {
      const f = S.farms[i];
      if (f && now() >= f.readyAt) { const got = claimBatch(i); sfx.feed(); toast('+' + got + ' 🍖'); save(); refreshTop(); }
      else { openShop('buildings'); }
      return;
    }
  }
  if (S.vault && near(PLOTS.vault, 60)) {
    const got = collectAll();
    if (got > 0) { sfx.coin(); toast('🏦 Collected ' + fmt(got) + ' 🪙 from everyone!'); save(); refreshTop(); maybeSubmitScore(); }
    return;
  }
}

// ============================== NAV ==============================
$('navBreed').onclick = () => { sfx.tap(); openBreed(); };
$('navShop').onclick = () => { sfx.tap(); openShop(); };
$('navQuest').onclick = () => { sfx.tap(); openQuests(); };
$('navBook').onclick = () => { sfx.tap(); openBook(); };
$('navBoard').onclick = () => { sfx.tap(); openBoard(); };
$('muteBtn').onclick = () => {
  muted = !muted;
  $('muteBtn').textContent = muted ? '♪ OFF' : '♪ ON';
  if (bgm) { if (muted) { bgm.pause(); musicOn = false; } else startMusic(); }
};
$('collectAllBtn').onclick = () => {
  const perCreature = S.creatures.map(c => [c, Math.floor(pendingOf(c))]);
  const got = collectAll();
  if (got > 0) {
    sfx.coin();
    for (const [c, amt] of perCreature) if (amt >= 1 && c._px !== undefined) puff(c._px, c._py - 50, 6, '#ffd166', '+' + fmt(amt));
    toast('💰 Collected ' + fmt(got) + ' 🪙 from the whole cove!');
    save(); refreshTop(); maybeSubmitScore();
  }
};

// ============================== MAIN LOOP ==============================
let lastFrame = 0, lastAutoSave = 0, lastUI = 0;
let renderErrShown = false;
function frame(t) {
  const dt = Math.min(0.05, (t - lastFrame) / 1000 || 0.016);
  lastFrame = t;
  for (const pt of particles) { pt.x += pt.vx * dt; pt.y += pt.vy * dt; pt.vy += 140 * dt; pt.life -= dt; }
  particles = particles.filter(p => p.life > 0);
  if (!SAFE_MODE && !roamer && !document.hidden && rng() < dt / 55) {
    spawnRoamer(rng() < 0.6 ? 'coin' : 'bfly', 120 + rng() * (WORLD_W - 700), 460 + rng() * 320);
  }
  try {
    drawScene(t);
  } catch (e) {
    // never let one bad frame strobe the whole game — and SAY what broke
    if (!renderErrShown) {
      renderErrShown = true;
      toast('⚠ render error: ' + (e && e.message ? e.message.slice(0, 80) : e));
      try { console.error('render error', e); } catch (e2) {}
    }
  }
  if (t - lastUI > 500) { lastUI = t; refreshTop(); }
  if (t - lastAutoSave > 15000) { lastAutoSave = t; save(); }
  requestAnimationFrame(frame);
}

// ============================== BOOT ==============================
function boot() {
  // (quests refresh inside refreshTop's tick; seed here so the button works immediately)
  // ?demo=1 — populated showcase state (screenshots/QA); never saved over a real game
  if (/(\?|&)demo=1/.test(location.search)) {
    S = defaultState();
    S.gold = 12345; S.food = 480; S.expansion = 2; S.vault = true; S.den2 = true;
    S.lifetime = 60000; S.treeStage = 4;
    S.shrines = { E: 2, M: 0, N: 3, B: 1 };
    S.farms = [{ food: 120, readyAt: now() + 300000 }, null, { food: 550, readyAt: now() - 1000 }];
    S.decor = { mush: 2, torch: 1, fount: 1 };
    const seedList = [['gnome','normal',3],['fairy','rare',2],['genie','normal',4],['ogre','normal',1],
      ['vampire','epic',5],['unicorn','normal',2],['yeti','rare',1],['phoenix','normal',1],['nessie','normal',2],['dragon','normal',1]];
    for (const [sp, v, lvl] of seedList) { const c = addCreature(sp, v); c.lvl = lvl; c.t0 = now() - 40 * 60000; S.disc[sp + ':' + v] = true; }
    S.breeds[0] = { aId: 1, bId: 2, sp: 'genie', v: 'normal', readyAt: now() + 95000 };
    S.breeds[1] = { aId: 3, bId: 4, sp: 'ogre', v: 'rare', readyAt: now() + 400000 };
    S.egg = { sp: 'unicorn', v: 'rare', readyAt: now() - 1000 };
    save = () => {};   // demo state must never clobber a real save
    resize(); refreshTop(); requestAnimationFrame(frame);
    return;
  }
  const had = load();
  resize();
  if (had) {
    // offline earnings summary (accrual is implicit via timestamps; this is the WELCOME)
    let waiting = 0;
    for (const c of S.creatures) waiting += pendingOf(c);
    const away = now() - (S.lastSeen || now());
    if (away > 90000 && waiting >= 1) toast('💤 While you were away, your creatures saved up ' + fmt(waiting) + ' 🪙!');
  } else {
    toast('🌊 Welcome to Creature Cove! Tap your Gnome to collect gold.');
    setTimeout(() => toast('🏪 Buy a Fairy in the Shop, then visit the Breeding Den!'), 3800);
    save();
  }
  refreshTop();
  requestAnimationFrame(frame);
}
boot();

// ---------------- test driver (headless harness injects via ?test hooks) ----------------
globalThis.__CC = {
  get S() { return S; }, set S(v) { S = v; },
  SPECIES, VARIANTS, EXPANSIONS, FOOD_BATCHES, TIER_WEIGHT, VAR_ODDS, SP_KEYS, DECOR,
  elUnion, breedPool, rollSpecies, rollVariant, breedTimeMs,
  gpmOf, capOf, capMinOf, pendingOf, collect, collectAll, feed, feedCostOf,
  addCreature, startBreed, claimBreed, hatchEgg, buyCreature, buyExpansion, buyFarm,
  startBatch, claimBatch, buyVault, buyDen2, buyDecor, discoveredSpecies,
  save, load, defaultState, denCount, busyIds, landCount, sellValue, sellCreature,
  EXPEDITIONS, expGold, startExpedition, claimExpedition, isAway,
  petCreature, spawnRoamer, catchRoamer, coveGpm, get roamer() { return roamer; },
  refreshQuests, questBump, questClaim, chestReady, claimChest, genQuests, questText,
  TREE_STAGES, treeStage, treeBonus, checkTreeGrowth,
  SHRINES, SHRINE_COSTS, shrineLvl, shrineBonus, buyShrine, EXP_RATE,
  drawScene, drawTree, resize, set eggFlyV(v) { eggFly = v; },
  setNow(msOffset) { _nowOffset = msOffset; },
  setRng(fn) { rng = fn || Math.random; },
  refreshTop, renderBreed, renderShop,
};
})();
</script>
